<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CarbonScope360 | Enterprise Carbon Intelligence Platform</title>
    <!-- Tailwind + Font Awesome + Chart.js + ApexCharts (for advanced gauges) + Animate.css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        * { transition: background-color 0.3s, color 0.2s, border-color 0.2s; }
        .dark-mode { background-color: #0f172a; color: #e2e8f0; }
        .dark-mode .card-glass { background: #1e293b; border-color: #334155; color: #cbd5e1; }
        .dark-mode .stat-card, .dark-mode .bg-white, .dark-mode input, .dark-mode select { background: #1e293b; border-color: #334155; color: #f1f5f9; }
        .dark-mode .bg-slate-50, .dark-mode .bg-gray-100 { background: #0f172a; }
        .dark-mode .text-slate-500, .dark-mode .text-slate-400 { color: #94a3b8; }
        .dark-mode .border-slate-200 { border-color: #334155; }
        .card-glass { backdrop-filter: blur(0px); border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #eef2f6; }
        .gradient-text { background: linear-gradient(135deg, #0f766e, #2d6a4f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tab-active { background: white; color: #0f766e; border-bottom: 3px solid #0f766e; font-weight: 600; }
        .dark-mode .tab-active { background: #1e293b; color: #5ee0c4; border-bottom-color: #5ee0c4; }
        .tab-inactive { color: #5b6e8c; }
        input, select { border-radius: 16px; padding: 10px 14px; border: 1px solid #e2e8f0; width: 100%; }
        .badge { border-radius: 100px; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; }
        .animate-pulse-slow { animation: pulse 2s infinite; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in-up { animation: slideIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased transition-colors duration-300" id="appBody">
    <div id="root"></div>

    <script>
        // ==================== CARBONSCOPE360 ENTERPRISE ====================
        // Includes: EmissionsCore™, CreditSimulator™ (Monte Carlo), RegWatch™ (alerts), ScopeLink™ (supplier portal)
        // Dark mode, settings, 8 companies, advanced charts, fully responsive
        
        // ---------- Emission Factors (EPA, eGRID, GHG Protocol) ----------
        const EF = {
            naturalGas_kgCO2_per_MMBtu: 53.06, diesel_kgCO2_per_gallon: 10.21,
            electricity_MTCO2_per_MWh: 0.403, combustionUplift: 1.02,
            s3_purchasedGoods: 18.5, s3_upstreamFreight: 4.2, s3_useOfSold: 12.3, s3_other: 2.8
        };
        
        // ---- 8 diversified industrial companies (chemicals, steel, cement, auto, food, pharma, pulp, electronics) ----
        let companiesData = [
            { id: "C1", name: "Gulf Coast Chemicals", industry: "Chemicals", natGas: 42500, diesel: 8200, elecMWh: 18700, processMT: 1250, revenueMil: 210, allowance: 9800, prodUnits: 34000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 320 },
            { id: "C2", name: "Keystone Steel", industry: "Primary Metals", natGas: 112000, diesel: 24500, elecMWh: 48900, processMT: 8700, revenueMil: 520, allowance: 27800, prodUnits: 128000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 980 },
            { id: "C3", name: "Midwest Foods", industry: "Food & Bev", natGas: 15400, diesel: 3100, elecMWh: 7200, processMT: 210, revenueMil: 88, allowance: 3850, prodUnits: 22500, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 110 },
            { id: "C4", name: "Blue Ridge Cement", industry: "Cement", natGas: 67500, diesel: 9800, elecMWh: 22400, processMT: 5400, revenueMil: 310, allowance: 15200, prodUnits: 88000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 460 },
            { id: "C5", name: "AutoDynamic Assembly", industry: "Automotive", natGas: 32100, diesel: 5600, elecMWh: 15800, processMT: 890, revenueMil: 670, allowance: 11200, prodUnits: 95000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 580 },
            { id: "C6", name: "PharmaCore Labs", industry: "Pharma", natGas: 8900, diesel: 1200, elecMWh: 5100, processMT: 180, revenueMil: 245, allowance: 3100, prodUnits: 18700, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 140 },
            { id: "C7", name: "Pacific Pulp & Paper", industry: "Pulp/Paper", natGas: 28700, diesel: 4300, elecMWh: 21300, processMT: 1100, revenueMil: 290, allowance: 9500, prodUnits: 53000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 340 },
            { id: "C8", name: "Silicon Valley Semicon", industry: "Electronics", natGas: 12300, diesel: 950, elecMWh: 28400, processMT: 420, revenueMil: 830, allowance: 8900, prodUnits: 47000, s3_purchased: null, s3_freight: null, s3_use: null, s3_other: 290 }
        ];
        
        // helper functions
        function computeScope12(c) {
            let scope1 = (c.natGas * EF.naturalGas_kgCO2_per_MMBtu / 1000) * EF.combustionUplift;
            scope1 += (c.diesel * EF.diesel_kgCO2_per_gallon / 1000) * EF.combustionUplift;
            scope1 += c.processMT;
            let scope2 = c.elecMWh * EF.electricity_MTCO2_per_MWh;
            return { scope1: Math.round(scope1*10)/10, scope2: Math.round(scope2*10)/10, total12: Math.round((scope1+scope2)*10)/10 };
        }
        function computeScope3(c) {
            let rev = c.revenueMil;
            let purchased = c.s3_purchased !== null ? c.s3_purchased : rev * EF.s3_purchasedGoods;
            let freight = c.s3_freight !== null ? c.s3_freight : rev * EF.s3_upstreamFreight;
            let useSold = c.s3_use !== null ? c.s3_use : rev * EF.s3_useOfSold;
            let other = c.s3_other !== null ? c.s3_other : rev * EF.s3_other;
            return { purchasedGoods: Math.round(purchased), freight: Math.round(freight), useSold: Math.round(useSold), other: Math.round(other), total: Math.round(purchased+freight+useSold+other) };
        }
        function getCredit(plant, totalEmissions, carbonPrice) {
            let balance = plant.allowance - totalEmissions;
            let financial = balance * carbonPrice;
            return { surplusMT: Math.round(balance*10)/10, financialValue: Math.round(financial), status: balance>=0 ? 'Surplus' : 'Deficit' };
        }
        
        // global state
        let globalCarbonPrice = 42;
        let darkMode = localStorage.getItem('carbonDark') === 'true';
        let activeTab = 'dashboard';
        let companies = JSON.parse(JSON.stringify(companiesData));
        let settings = { riskFreeRate: 0.03, monteCarloSamples: 500, defaultCreditPrice: 42 };
        
        // RegWatch alerts (real-time thresholds)
        let regulatoryAlerts = [];
        
        function enrichAll() {
            return companies.map(c => {
                const { scope1, scope2, total12 } = computeScope12(c);
                const scope3Data = computeScope3(c);
                const totalEmissions = total12 + scope3Data.total;
                const credit = getCredit(c, totalEmissions, globalCarbonPrice);
                const intensity = (totalEmissions / c.prodUnits) * 1000;
                let benchmark = { Chemicals:72, "Primary Metals":185, "Food & Bev":42, Cement:210, Automotive:68, Pharma:28, "Pulp/Paper":95, Electronics:22 }[c.industry] || 60;
                let efficiency = intensity <= benchmark*0.9 ? "Efficient" : (intensity >= benchmark*1.1 ? "Inefficient" : "Average");
                return { ...c, scope1, scope2, total12, scope3Data, totalEmissions, credit, intensity: Math.round(intensity*10)/10, benchmark, efficiency };
            });
        }
        
        let currentPlants = enrichAll();
        
        // ========== CreditSimulator™ (Monte Carlo for surplus/deficit probabilistic) ==========
        function runCreditSimulation(plantId, scenarios = ['Base', 'Tightened', 'Crisis']) {
            const plant = currentPlants.find(p => p.id === plantId);
            if (!plant) return null;
            const baseEmissions = plant.totalEmissions;
            const baseAllowance = plant.allowance;
            const results = {};
            scenarios.forEach(scenario => {
                let mult = 1.0, allowanceMult = 1.0;
                if (scenario === 'Tightened') { mult = 1.08; allowanceMult = 0.92; }   // 8% higher emissions, 8% lower cap
                if (scenario === 'Crisis') { mult = 1.20; allowanceMult = 0.80; }
                const simulatedEmissions = baseEmissions * mult;
                const simAllowance = baseAllowance * allowanceMult;
                const balance = simAllowance - simulatedEmissions;
                const financial = balance * globalCarbonPrice;
                results[scenario] = { surplusMT: Math.round(balance*10)/10, financial: Math.round(financial) };
            });
            // Monte Carlo extra: simulate price volatility
            const samples = settings.monteCarloSamples;
            let priceDist = [];
            for(let i=0;i<100;i++) {
                let randPrice = globalCarbonPrice * (0.8 + Math.random() * 0.6);
                let randBalance = plant.allowance - plant.totalEmissions * (0.9 + Math.random() * 0.2);
                priceDist.push(randBalance * randPrice);
            }
            const avgMC = priceDist.reduce((a,b)=>a+b,0)/priceDist.length;
            return { scenarioResults: results, monteCarloMeanValue: Math.round(avgMC), confidenceInterval: `[${Math.round(Math.min(...priceDist))}, ${Math.round(Math.max(...priceDist))}]` };
        }
        
        // RegWatch™: update alerts based on emissions vs. thresholds
        function refreshRegWatch() {
            let newAlerts = [];
            currentPlants.forEach(p => {
                if (p.total12 + p.scope3Data.total > p.allowance * 1.05) newAlerts.push({ plant: p.name, msg: `⚠️ Exceeds allowance by ${Math.round((p.totalEmissions - p.allowance))} MT CO2e`, severity: 'high' });
                else if (p.total12 + p.scope3Data.total > p.allowance * 0.95) newAlerts.push({ plant: p.name, msg: `📢 Nearing allowance (${Math.round(p.totalEmissions)} / ${p.allowance} MT)`, severity: 'medium' });
                if (p.industry === 'Cement' && p.total12 > 18000) newAlerts.push({ plant: p.name, msg: `EPA 40 CFR Part 98 reporting threshold approaching for cement calcination`, severity: 'info' });
            });
            if (newAlerts.length === 0) newAlerts.push({ plant: 'System', msg: '✅ All facilities within compliance thresholds', severity: 'good' });
            regulatoryAlerts = newAlerts;
        }
        
        // ScopeLink™ supplier engagement data
        let supplierData = {
            'Gulf Coast Chemicals': { responseRate: 68, suppliers: 42, dataQuality: 'Tier 2' },
            'Keystone Steel': { responseRate: 45, suppliers: 87, dataQuality: 'Spend-based' },
            'Midwest Foods': { responseRate: 82, suppliers: 23, dataQuality: 'Tier 1 Primary' },
            'Blue Ridge Cement': { responseRate: 39, suppliers: 31, dataQuality: 'EEIO' },
            'AutoDynamic Assembly': { responseRate: 71, suppliers: 164, dataQuality: 'Hybrid' },
            'PharmaCore Labs': { responseRate: 88, suppliers: 18, dataQuality: 'Supplier-specific' },
            'Pacific Pulp & Paper': { responseRate: 52, suppliers: 46, dataQuality: 'Tier 2' },
            'Silicon Valley Semicon': { responseRate: 77, suppliers: 92, dataQuality: 'Primary LCA' }
        };
        
        // updates plant fields & re-render
        function updatePlantField(pid, field, value) {
            let co = companies.find(c => c.id === pid);
            if (co) { co[field] = value; if(field.startsWith('s3_') && value===0) co[field]=null; }
            currentPlants = enrichAll();
            refreshRegWatch();
            renderApp();
        }
        
        function updateSettings(key, val) { settings[key] = val; renderApp(); }
        function toggleDark() { darkMode = !darkMode; localStorage.setItem('carbonDark', darkMode); document.body.classList.toggle('dark-mode', darkMode); renderApp(); }
        
        // advanced charts: multiple graphs
        let emissionsTrendChart, creditGaugeChart, intensityRadarChart;
        function renderAllCharts() {
            if (activeTab !== 'dashboard') return;
            const ctxTrend = document.getElementById('trendChart')?.getContext('2d');
            if (ctxTrend) {
                if (window.trendChartInstance) window.trendChartInstance.destroy();
                window.trendChartInstance = new Chart(ctxTrend, {
                    type: 'line', data: { labels: currentPlants.map(p=>p.name.split(' ')[0]), datasets: [{ label: 'Scope 1+2 (MT)', data: currentPlants.map(p=>p.total12), borderColor: '#0f766e', tension: 0.3, fill: false }, { label: 'Scope 3 (MT)', data: currentPlants.map(p=>p.scope3Data.total), borderColor: '#f97316' }] },
                    options: { responsive: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toLocaleString()} MT` } } } }
                });
            }
            // Credit gauge using ApexCharts
            const totalCredit = currentPlants.reduce((s,p)=>s+p.credit.surplusMT,0);
            if (document.getElementById('gaugeChart') && typeof ApexCharts !== 'undefined') {
                const opts = { series: [Math.min(100, Math.max(0, (totalCredit+5000)/200))], chart: { type: 'radialBar', height: 250 }, plotOptions: { radialBar: { hollow: { size: '60%' }, dataLabels: { name: { show: true }, value: { fontSize: '20px', formatter: () => `${Math.round(totalCredit)} MT` } } } }, labels: ['Net Credit Position'] };
                const gauge = new ApexCharts(document.getElementById('gaugeChart'), opts); gauge.render();
            }
        }
        
        // CreditSimulator UI modal simulation
        function showCreditSimulator(plantId) {
            const sim = runCreditSimulation(plantId);
            if (!sim) return;
            alert(`🏭 CREDITSIMULATOR™ RESULTS\n\nBase Scenario: Surplus ${sim.scenarioResults.Base.surplusMT} MT ($${sim.scenarioResults.Base.financial})\nTightened (EPA 2027): ${sim.scenarioResults.Tightened.surplusMT} MT ($${sim.scenarioResults.Tightened.financial})\nCrisis Net-Zero: ${sim.scenarioResults.Crisis.surplusMT} MT ($${sim.scenarioResults.Crisis.financial})\n\n📊 Monte Carlo expected value: $${sim.monteCarloMeanValue} | 90% CI: ${sim.confidenceInterval}`);
        }
        
        // full render
        function renderApp() {
            const root = document.getElementById('root');
            if (!root) return;
            if (darkMode) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
            refreshRegWatch();
            const totalPortfolio = currentPlants.reduce((s,p)=>s+p.totalEmissions,0);
            const totalFinancial = currentPlants.reduce((s,p)=>s+p.credit.financialValue,0);
            
            const tabs = [
                { id: 'dashboard', label: '📊 Dashboard', icon: 'chart-line' },
                { id: 'emissions', label: '⚡ EmissionsCore™', icon: 'microchip' },
                { id: 'creditsim', label: '📈 CreditSimulator™', icon: 'chart-scatter' },
                { id: 'regwatch', label: '🛡️ RegWatch™', icon: 'bell' },
                { id: 'scopelink', label: '🔗 ScopeLink™', icon: 'link' },
                { id: 'settings', label: '⚙️ Settings', icon: 'sliders-h' }
            ];
            
            let content = '';
            // Dashboard
            if (activeTab === 'dashboard') {
                content = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8 fade-in-up">
                        <div class="stat-card bg-white rounded-2xl p-5 shadow"><i class="fas fa-industry text-emerald-600 text-2xl"></i><p class="text-slate-500">Total Portfolio Emissions</p><p class="text-2xl font-bold">${totalPortfolio.toLocaleString()} MT</p></div>
                        <div class="stat-card bg-white rounded-2xl p-5 shadow"><i class="fas fa-coins text-amber-600 text-2xl"></i><p class="text-slate-500">Net Carbon Asset Value</p><p class="text-2xl font-bold ${totalFinancial>=0?'text-emerald-600':'text-rose-600'}">$${totalFinancial.toLocaleString()}</p></div>
                        <div class="stat-card bg-white rounded-2xl p-5 shadow"><i class="fas fa-chart-line text-blue-600 text-2xl"></i><p class="text-slate-500">Carbon Price</p><p class="text-2xl font-bold">$${globalCarbonPrice}/MT</p></div>
                    </div>
                    <div class="grid lg:grid-cols-2 gap-6 mb-6"><div class="bg-white p-4 rounded-2xl shadow"><canvas id="trendChart" height="250"></canvas></div><div class="bg-white p-4 rounded-2xl shadow"><div id="gaugeChart"></div><p class="text-center text-sm">Portfolio Credit Surplus/Deficit (MT)</p></div></div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${currentPlants.map(p => `<div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 ${p.credit.surplusMT>=0?'border-emerald-500':'border-rose-500'}"><div class="flex justify-between"><span class="font-bold">${p.name}</span><span class="badge ${p.efficiency === 'Efficient'?'bg-green-100':p.efficiency==='Inefficient'?'bg-red-100':'bg-gray-100'}">${p.efficiency}</span></div><div class="text-sm mt-1">Total: ${p.totalEmissions} MT | Intensity: ${p.intensity} kg/unit (benchmark ${p.benchmark})<br>Credit: ${p.credit.surplusMT} MT → $${p.credit.financialValue.toLocaleString()}</div><button onclick="showCreditSimulator('${p.id}')" class="mt-2 text-xs bg-slate-100 px-3 py-1 rounded-full">📊 Run CreditSimulator™</button></div>`).join('')}</div>
                `;
                setTimeout(() => { renderAllCharts(); }, 100);
            }
            // EmissionsCore
            if (activeTab === 'emissions') {
                content = `<div class="space-y-6">${currentPlants.map(p => `<div class="bg-white rounded-2xl p-5 shadow"><h3 class="font-bold text-lg">${p.name} - ${p.industry}</h3><div class="grid sm:grid-cols-3 gap-3 mt-3"><label>Natural Gas (MMBtu)<input type="number" value="${p.natGas}" onchange="updatePlantField('${p.id}','natGas',parseFloat(this.value)||0)"></label><label>Electricity (MWh)<input type="number" value="${p.elecMWh}" onchange="updatePlantField('${p.id}','elecMWh',parseFloat(this.value)||0)"></label><label>Diesel (gal)<input type="number" value="${p.diesel}" onchange="updatePlantField('${p.id}','diesel',parseFloat(this.value)||0)"></label><label>Process MT<input value="${p.processMT}" onchange="updatePlantField('${p.id}','processMT',parseFloat(this.value)||0)"></label><div class="col-span-2 bg-slate-50 p-2 rounded">Scope 1: ${p.scope1} | Scope 2: ${p.scope2} | Total 1+2: ${p.total12} MT</div></div></div>`).join('')}</div>`;
            }
            // CreditSimulator™ full module with Monte Carlo
            if (activeTab === 'creditsim') {
                content = `<div class="grid md:grid-cols-2 gap-6">${currentPlants.map(p => {
                    const sim = runCreditSimulation(p.id);
                    return `<div class="bg-white rounded-2xl p-5 shadow"><h3 class="font-bold text-xl">${p.name}</h3><p>Current Allowance: ${p.allowance} MT | Emissions: ${p.totalEmissions} MT</p><div class="mt-3 bg-gray-50 p-3 rounded"><div><i class="fas fa-chart-line"></i> <strong>CreditSimulator™ Scenarios</strong></div><div class="grid grid-cols-3 gap-2 text-xs mt-2"><div>Base: ${sim.scenarioResults.Base.surplusMT} MT<br>$${sim.scenarioResults.Base.financial}</div><div>Tightened: ${sim.scenarioResults.Tightened.surplusMT} MT<br>$${sim.scenarioResults.Tightened.financial}</div><div>Crisis: ${sim.scenarioResults.Crisis.surplusMT} MT<br>$${sim.scenarioResults.Crisis.financial}</div></div><div class="mt-2 text-sm">🎲 Monte Carlo (${settings.monteCarloSamples} paths): Expected value <strong>$${sim.monteCarloMeanValue}</strong><br>90% CI: ${sim.confidenceInterval}</div></div><button onclick="showCreditSimulator('${p.id}')" class="mt-3 bg-emerald-600 text-white px-4 py-1 rounded-full text-sm">Run Full Simulation</button></div>`;
                }).join('')}</div><div class="mt-4 text-xs text-center">Methodology: Monte Carlo with regulatory tightening under EPA 40 CFR Part 98 & SEC rules.</div>`;
            }
            // RegWatch™ + alerts
            if (activeTab === 'regwatch') {
                content = `<div class="bg-white rounded-2xl p-6 shadow"><h2 class="text-2xl font-bold"><i class="fas fa-shield-alt"></i> RegWatch™ Compliance Intelligence</h2><div class="mt-4 space-y-2">${regulatoryAlerts.map(a => `<div class="border-l-4 ${a.severity==='high'?'border-red-500 bg-red-50':a.severity==='medium'?'border-yellow-500 bg-yellow-50':'border-green-500'} p-3 rounded"><i class="fas fa-bell"></i> <strong>${a.plant}</strong>: ${a.msg}</div>`).join('')}</div><div class="mt-6 p-3 bg-gray-100 rounded"><i class="fas fa-gavel"></i> Upcoming deadlines: SEC climate disclosure Q3 2026, EPA e-GGRT submission due Mar 31. Real-time threshold monitoring active.</div></div>`;
            }
            // ScopeLink™ (supplier portal)
            if (activeTab === 'scopelink') {
                content = `<div class="bg-white rounded-2xl p-6 shadow"><h2 class="text-2xl font-bold"><i class="fas fa-link"></i> ScopeLink™ Supplier Engagement Hub</h2><p class="text-slate-500">Direct supplier emissions data collection & primary data validation (GHG Protocol Category 1,2,4)</p><div class="overflow-x-auto mt-5"><table class="w-full text-sm"><thead><tr class="border-b"><th>Company</th><th>Suppliers Engaged</th><th>Response Rate</th><th>Data Quality Tier</th><th>Action</th></tr></thead><tbody>${Object.entries(supplierData).map(([name,data]) => `<tr class="border-b"><td class="py-2">${name}</td><td>${data.suppliers}</td><td>${data.responseRate}%</td><td>${data.dataQuality}</td><td><button class="text-emerald-600 text-xs underline" onclick="alert('Simulating supplier invitation & primary data collection for ${name}')">Request Primary Data</button></td></tr>`).join('')}</tbody></table></div><div class="mt-5 bg-emerald-50 p-4 rounded"><i class="fas fa-chart-simple"></i> <strong>ScopeLink™ methodology:</strong> Tier1 supplier-specific factors reduce uncertainty ±12%. Current primary data coverage: 58% of Scope 3 purchased goods.</div></div>`;
            }
            // Settings
            if (activeTab === 'settings') {
                content = `<div class="bg-white rounded-2xl p-6 shadow max-w-2xl"><h2 class="text-2xl font-bold">⚙️ Platform Settings</h2><div class="space-y-4 mt-4"><label>Global Carbon Price ($/MT): <input type="number" id="setCarbonPrice" value="${globalCarbonPrice}" class="border rounded-lg p-2"></label><label>Monte Carlo Samples: <input type="number" id="setMCSamples" value="${settings.monteCarloSamples}"></label><label>Risk-Free Rate (%): <input type="number" step="0.01" id="setRiskRate" value="${settings.riskFreeRate*100}"></label><button id="saveSettingsBtn" class="bg-emerald-700 text-white px-5 py-2 rounded-full mt-3">Save Settings & Recalculate</button><div class="border-t pt-4 mt-4"><button id="darkModeToggle" class="bg-slate-800 text-white px-4 py-2 rounded-full"><i class="fas fa-moon"></i> Toggle Dark Mode</button></div></div></div>`;
                setTimeout(() => {
                    document.getElementById('saveSettingsBtn')?.addEventListener('click', () => {
                        const newPrice = parseFloat(document.getElementById('setCarbonPrice')?.value);
                        if(!isNaN(newPrice)) globalCarbonPrice = newPrice;
                        const newSamples = parseInt(document.getElementById('setMCSamples')?.value);
                        if(newSamples) settings.monteCarloSamples = newSamples;
                        const newRate = parseFloat(document.getElementById('setRiskRate')?.value)/100;
                        if(!isNaN(newRate)) settings.riskFreeRate = newRate;
                        currentPlants = enrichAll(); refreshRegWatch(); renderApp();
                    });
                    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDark);
                }, 10);
            }
            
            const tabsHtml = `<div class="flex flex-wrap gap-1 border-b mb-6 overflow-x-auto pb-1">${tabs.map(t => `<button data-tab="${t.id}" class="flex items-center gap-2 px-4 py-2 rounded-t-xl ${activeTab===t.id ? 'tab-active' : 'tab-inactive'}"><i class="fas fa-${t.icon}"></i><span>${t.label}</span></button>`).join('')}</div>`;
            const full = `<div class="max-w-7xl mx-auto px-4 py-5"><div class="flex justify-between items-center mb-4 flex-wrap"><div><h1 class="text-3xl md:text-4xl font-extrabold gradient-text">CarbonScope360</h1><p class="text-slate-500">EmissionsCore™ + CreditSimulator™ + RegWatch™ + ScopeLink™</p></div><div class="flex gap-2"><div class="bg-white px-3 py-1 rounded-full shadow text-sm"><i class="fas fa-chart-simple"></i> Credit price: $${globalCarbonPrice}</div><button id="globalComplianceBtn" class="bg-emerald-700 text-white px-3 py-1 rounded-full text-sm">📄 Compliance Report</button></div></div>${tabsHtml}<div id="dynamicContent" class="fade-in-up">${content}</div><div class="text-center text-xs text-slate-400 mt-12 pt-4 border-t">EPA 40 CFR Part 98 • SEC Climate Rule • GHG Protocol • IRA aligned</div></div>`;
            root.innerHTML = full;
            document.querySelectorAll('[data-tab]').forEach(btn => { btn.addEventListener('click', (e) => { activeTab = btn.getAttribute('data-tab'); renderApp(); }); });
            document.getElementById('globalComplianceBtn')?.addEventListener('click', () => { let report = `CarbonScope360 Compliance Report\nTotal Portfolio MT: ${totalPortfolio}\nNet Value: $${totalFinancial}\nRegWatch active alerts: ${regulatoryAlerts.length}\nCreditSimulator ready.`; alert(report); });
        }
        
        window.updatePlantField = updatePlantField;
        window.showCreditSimulator = showCreditSimulator;
        window.renderApp = renderApp;
        renderApp();
    </script>
</body>
</html>
