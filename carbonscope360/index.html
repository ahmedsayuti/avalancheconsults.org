<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonScope360 | Enterprise Carbon Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231e6f5c'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='white'%3E🌿%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #020f0a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at 20% 20%, rgba(16, 80, 50, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(10, 50, 80, 0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(2, 15, 10, 0.6) 0%, transparent 80%);
            pointer-events: none;
        }
        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image: linear-gradient(rgba(30, 111, 92, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 111, 92, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== LAYOUT ===== */
        #app {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 0.75rem 3rem;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(2, 15, 10, 0.85);
            border-bottom: 1px solid rgba(30, 111, 92, 0.3);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 0.6rem 0.75rem;
        }
        .logo-text {
            background: linear-gradient(135deg, #4ade80, #22d3ee, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
            display: inline-block;
            margin-right: 6px;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.4);
            }
        }
        .price-badge {
            background: rgba(30, 111, 92, 0.25);
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 0.3rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            color: #4ade80;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e6f5c, #16a085);
            color: white;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            min-height: 34px;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(30, 111, 92, 0.4);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 0.4rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 34px;
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        /* ===== TABS ===== */
        .tabs-bar {
            display: flex;
            gap: 2px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tabs-bar::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #64748b;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            min-height: 36px;
        }
        .tab-btn:hover {
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(30, 111, 92, 0.5), rgba(22, 160, 133, 0.3));
            color: #4ade80;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(30, 111, 92, 0.2);
        }

        /* ===== RESPONSIVE GRID CLASSES ===== */
        .resp-grid {
            display: grid;
            gap: 1rem;
        }
        .resp-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .resp-grid-2-1 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }
        .resp-grid-1-2 {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }
        .resp-grid-1-1\.5 {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1rem;
        }
        .resp-grid-320-1 {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
            align-items: start;
        }
        .resp-grid-auto {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
        }
        .resp-grid-kpi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 0.75rem;
        }

        /* Mobile stacking */
        @media (max-width: 860px) {
            .resp-grid-2,
            .resp-grid-2-1,
            .resp-grid-1-2,
            .resp-grid-1-1\.5,
            .resp-grid-320-1 {
                grid-template-columns: 1fr;
            }
            .resp-grid-320-1 {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 600px) {
            .resp-grid-kpi {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 0.5rem;
            }
            .resp-grid-auto {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 0.5rem;
            }
        }

        /* ===== CHART CONTAINERS ===== */
        .chart-wrap {
            position: relative;
            width: 100%;
            min-height: 240px;
        }
        .chart-wrap-sm {
            position: relative;
            width: 100%;
            min-height: 200px;
        }
        .chart-wrap-lg {
            position: relative;
            width: 100%;
            min-height: 300px;
        }
        .chart-wrap-xl {
            position: relative;
            width: 100%;
            min-height: 340px;
        }
        @media (max-width: 768px) {
            .chart-wrap {
                min-height: 210px;
            }
            .chart-wrap-sm {
                min-height: 175px;
            }
            .chart-wrap-lg {
                min-height: 250px;
            }
            .chart-wrap-xl {
                min-height: 280px;
            }
        }
        @media (max-width: 480px) {
            .chart-wrap {
                min-height: 185px;
            }
            .chart-wrap-sm {
                min-height: 155px;
            }
            .chart-wrap-lg {
                min-height: 220px;
            }
            .chart-wrap-xl {
                min-height: 240px;
            }
        }

        /* ===== CARDS ===== */
        .card {
            background: rgba(10, 25, 18, 0.75);
            border: 1px solid rgba(30, 111, 92, 0.2);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            transition: all 0.25s;
            padding: 1rem;
        }
        .card:hover {
            border-color: rgba(74, 222, 128, 0.25);
            box-shadow: 0 0 30px rgba(30, 111, 92, 0.15);
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .card-title i {
            color: #4ade80;
            width: 16px;
            flex-shrink: 0;
        }

        /* ===== METRIC CARDS ===== */
        .metric-card {
            background: rgba(10, 25, 18, 0.8);
            border: 1px solid rgba(30, 111, 92, 0.2);
            border-radius: 14px;
            padding: 0.85rem 0.9rem;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 3px 3px 0 0;
        }
        .metric-card.green::before {
            background: linear-gradient(90deg, #4ade80, #22d3ee);
        }
        .metric-card.blue::before {
            background: linear-gradient(90deg, #60a5fa, #818cf8);
        }
        .metric-card.amber::before {
            background: linear-gradient(90deg, #fbbf24, #f97316);
        }
        .metric-card.rose::before {
            background: linear-gradient(90deg, #f43f5e, #ec4899);
        }
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .metric-label {
            font-size: 0.68rem;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }
        .metric-value {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 800;
            line-height: 1.15;
        }
        .metric-sub {
            font-size: 0.68rem;
            color: #64748b;
            margin-top: 5px;
        }
        .metric-icon {
            position: absolute;
            right: 0.75rem;
            top: 0.85rem;
            font-size: 1.3rem;
            opacity: 0.13;
        }

        /* ===== ALERTS ===== */
        .alert-item {
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
            animation: slideRight 0.3s ease;
            font-size: 0.78rem;
        }
        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .alert-high {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
        }
        .alert-medium {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #f59e0b;
        }
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
        }

        /* ===== PROGRESS BARS ===== */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.8s ease;
        }
        .fill-green {
            background: linear-gradient(90deg, #4ade80, #22d3ee);
        }
        .fill-blue {
            background: linear-gradient(90deg, #60a5fa, #818cf8);
        }
        .fill-amber {
            background: linear-gradient(90deg, #fbbf24, #f97316);
        }
        .fill-rose {
            background: linear-gradient(90deg, #f43f5e, #ec4899);
        }

        /* ===== TABLE ===== */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 600px;
        }
        .data-table th {
            padding: 0.6rem 0.7rem;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            white-space: nowrap;
        }
        .data-table td {
            padding: 0.6rem 0.7rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #cbd5e1;
            white-space: nowrap;
        }
        .data-table tr:hover td {
            background: rgba(30, 111, 92, 0.06);
        }
        @media (max-width: 480px) {
            .data-table {
                font-size: 0.7rem;
                min-width: 500px;
            }
            .data-table th,
            .data-table td {
                padding: 0.45rem 0.5rem;
            }
        }

        /* ===== BADGES ===== */
        .badge {
            padding: 0.12rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .badge-green {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .badge-amber {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        .badge-red {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .badge-blue {
            background: rgba(96, 165, 250, 0.1);
            color: #93c5fd;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .badge-purple {
            background: rgba(167, 139, 250, 0.1);
            color: #c4b5fd;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        /* ===== FORM CONTROLS ===== */
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.45rem 0.6rem;
            color: #e2e8f0;
            font-size: 0.78rem;
            width: 100%;
            transition: border-color 0.2s;
            outline: none;
            min-height: 36px;
        }
        .form-input:focus {
            border-color: rgba(74, 222, 128, 0.4);
            background: rgba(30, 111, 92, 0.1);
        }
        /* Fix dropdown menu background */
        select.form-input option {
            background-color: #0a1912;
            color: #e2e8f0;
        }
        .range-input {
            width: 100%;
            accent-color: #4ade80;
            cursor: pointer;
            min-height: 28px;
        }

        /* ===== MODAL ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-box {
            background: rgba(10, 25, 18, 0.97);
            border: 1px solid rgba(30, 111, 92, 0.35);
            border-radius: 20px;
            max-width: 560px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }
        @media (max-width: 480px) {
            .modal-box {
                padding: 1.1rem;
                border-radius: 16px;
                max-height: 90vh;
            }
        }

        /* ===== TOOLTIP ===== */
        [data-tip] {
            position: relative;
            cursor: help;
        }
        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(2, 15, 10, 0.95);
            border: 1px solid rgba(30, 111, 92, 0.4);
            color: #e2e8f0;
            font-size: 0.7rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }

        /* ===== ANIMATIONS ===== */
        .fade-in {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .glow-green {
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
        }
        .pulse-ring {
            animation: pulseRing 2s ease infinite;
        }
        @keyframes pulseRing {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.25);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(74, 222, 128, 0);
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(30, 111, 92, 0.4);
            border-radius: 9999px;
        }

        /* ===== CANVAS FIX ===== */
        canvas {
            max-width: 100% !important;
        }

        /* ===== SECTION DIVIDER ===== */
        .section-glow {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(30, 111, 92, 0.5), transparent);
            margin: 1.25rem 0;
        }

        /* ===== FOOTER ===== */
        .footer-bar {
            border-top: 1px solid rgba(30, 111, 92, 0.15);
            padding: 0.75rem 0;
            text-align: center;
            color: #1e4a38;
            font-size: 0.68rem;
        }

        /* ===== MOBILE HEADER TWEAKS ===== */
        @media (max-width: 600px) {
            .header {
                padding: 0.5rem 0.5rem;
            }
            .btn-primary,
            .btn-ghost {
                padding: 0.35rem 0.6rem;
                font-size: 0.7rem;
                gap: 3px;
                min-height: 30px;
            }
            .price-badge {
                font-size: 0.65rem;
                padding: 0.25rem 0.5rem;
            }
            .tabs-bar {
                gap: 1px;
                padding: 3px;
                border-radius: 12px;
            }
            .tab-btn {
                padding: 0.4rem 0.6rem;
                font-size: 0.68rem;
                gap: 4px;
                min-height: 32px;
                border-radius: 8px;
            }
            .card {
                padding: 0.75rem;
                border-radius: 14px;
            }
            .card-title {
                font-size: 0.78rem;
                margin-bottom: 0.6rem;
            }
            .metric-card {
                padding: 0.7rem 0.75rem;
                border-radius: 12px;
            }
            .metric-label {
                font-size: 0.62rem;
            }
            .metric-value {
                font-size: 1.1rem;
            }
            .metric-sub {
                font-size: 0.62rem;
            }
            .metric-icon {
                font-size: 1.1rem;
                right: 0.5rem;
                top: 0.6rem;
            }
            .footer-bar {
                font-size: 0.62rem;
                padding: 0.6rem 0;
            }
            .alert-item {
                font-size: 0.72rem;
                padding: 0.5rem 0.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Canvas Background -->
    <canvas id="bg-canvas"></canvas>
    <div class="bg-overlay"></div>
    <div class="grid-lines"></div>

    <div id="app">
        <!-- HEADER -->
        <header class="header">
            <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
                <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                    <div>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span class="logo-text">CarbonScope360</span>
                            <span class="badge badge-green" style="font-size:0.6rem;">LIVE</span>
                        </div>
                        <div style="font-size:0.62rem;color:#1e6f5c;margin-top:1px;">by Avalanche Consulting &amp; Management Services, LLC</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                    <div style="display:flex;align-items:center;gap:5px;" class="price-badge">
                        <span class="live-dot"></span>
                        Carbon Price: <span id="hdr-price" style="font-weight:800;">$42</span>/MT

        // ---- MONTE CARLO ----
        function runMonteCarlo(prodChange, regTightening, priceVol, supplierQuality, offsetCost, samples = 500) {
            const totalAllowanceBase = currentPlants.reduce((s, p) => s + p.allowance, 0);
            const totalEmissionsBase = currentPlants.reduce((s, p) => s + p.total, 0);
            const scope3Portion = currentPlants.reduce((s, p) => s + p.s3.total, 0);
            const scope12Portion = totalEmissionsBase - scope3Portion;
            let results = [];
            for (let i = 0; i < samples; i++) {
                let prodN = 1 + (prodChange / 100) + (Math.random() - 0.5) * 0.05;
                let regN = 1 - (regTightening / 100) + (Math.random() - 0.5) * 0.02;
                let priceN = globalCarbonPrice * (1 + priceVol / 100) * (0.9 + Math.random() * 0.2);
                let supN = 1 - (supplierQuality / 100) * 0.15 + (Math.random() - 0.5) * 0.03;
                let em = (scope12Portion * prodN) + (scope3Portion * prodN * supN);
                let all = totalAllowanceBase * regN;
                let net = all - em;
                let fin = net * priceN - (net < 0 ? Math.abs(net) * offsetCost : 0);
                results.push({ netCredit: net, financial: fin, emissions: em });
            }
            results.sort((a, b) => a.netCredit - b.netCredit);
            return {
                p10: results[Math.floor(samples * 0.1)],
                p50: results[Math.floor(samples * 0.5)],
                p90: results[Math.floor(samples * 0.9)],
                meanCredit: results.reduce((s, r) => s + r.netCredit, 0) / samples,
                deficitProbability: results.filter(r => r.netCredit < 0).length / samples,
                samples: results
            };
        }

        function renderCreditSim() {
            const totalAllowance = currentPlants.reduce((s, p) => s + p.allowance, 0);
            const totalEmissions = currentPlants.reduce((s, p) => s + p.total, 0);
            const currentNetCredit = totalAllowance - totalEmissions;
            const currentFinancial = currentNetCredit * globalCarbonPrice;

            setTimeout(() => {
                const sliders = ['simProd', 'simReg', 'simVol', 'simSup', 'simOffset'];
                sliders.forEach(id => document.getElementById(id)?.addEventListener('input',
                runSimFn));
                document.getElementById('runSimBtn')?.addEventListener('click', runSimFn);
                runSimFn();
            }, 120);

            function runSimFn() {
                const prod = +document.getElementById('simProd')?.value || 0;
                const reg = +document.getElementById('simReg')?.value || 0;
                const vol = +document.getElementById('simVol')?.value || 0;
                const sup = +document.getElementById('simSup')?.value || 50;
                const off = +document.getElementById('simOffset')?.value || 25;
                ['Prod', 'Reg', 'Vol', 'Sup', 'Offset'].forEach((n, i) => {
                    const el = document.getElementById('simVal' + n);
                    if (el) el.innerText = [prod, reg, vol, sup, off][i];
                });
                const mc = runMonteCarlo(prod, reg, vol, sup, off, settings.monteCarloSamples);
                const fmt = v => `${v>=0?'+':''}${Math.round(v).toLocaleString()} MT`;
                setEl('res-mean', fmt(mc.meanCredit), mc.meanCredit >= 0 ? '#4ade80' : '#f87171');
                setEl('res-p10', fmt(mc.p10.netCredit), mc.p10.netCredit >= 0 ? '#4ade80' : '#f87171');
                setEl('res-p90', fmt(mc.p90.netCredit), mc.p90.netCredit >= 0 ? '#4ade80' : '#f87171');
                setEl('res-deficit', `${(mc.deficitProbability*100).toFixed(1)}%`, mc.deficitProbability > 0.3 ?
                    '#f87171' : '#fbbf24');
                setEl('res-fin', `$${Math.round(mc.p50.financial).toLocaleString()}`, '#4ade80');
                const credits = mc.samples.map(r => r.netCredit);
                const mn = Math.min(...credits),
                    mx = Math.max(...credits),
                    step = (mx - mn) / 20;
                const bins = [];
                for (let i = 0; i < 20; i++) { const lo = mn + i * step;
                    bins.push({ lo, count: credits.filter(c => c >= lo && c < lo + step).length }); }
                mkChart('distChart', {
                    type: 'bar',
                    data: {
                        labels: bins.map(b => Math.round(b.lo).toLocaleString()),
                        datasets: [{ label: 'Scenarios', data: bins.map(b => b.count),

                                ticks: { color: '#64748b', font: { size: 8 } } } },
                        plugins: { legend: { display: false } } }
                });
            }
            window.runSimFn = runSimFn;

            function setEl(id, val, color) { const el = document.getElementById(id); if (el) { el.innerText = val;

            return `<div class="fade-in">

        // ====================================================

        function renderScopeLink() {
            let total = 0,
                responded = 0,
                totalDef = 0,
                totalPri = 0;
            for (let cid in supplierMaster) { for (let cat in supplierMaster[cid]) { total++;
                    const s = supplierMaster[cid][cat];
                    totalDef += s.defaultMT; if (s.primaryMT != null) { responded++;
                        totalPri += s.primaryMT; } } }
            const rate = Math.round((responded / total) * 100);
            const reduction = totalDef ? Math.round(((totalDef - totalPri) / totalDef) * 100) : 0;
            return `<div class="fade-in">
      <div class="resp-grid-auto" style="margin-bottom:1rem;">

        window.updateSupplierPrimary = (cid, cat, val) => {
            if (supplierMaster[cid] && supplierMaster[cid][cat]) {
                supplierMaster[cid][cat].primaryMT = val === '' ? null : parseFloat(val);
                supplierMaster[cid][cat].responseStatus = val !== '' ? 'responded' : 'pending';
                supplierMaster[cid][cat].lastUpdated = new Date().toISOString().slice(0, 10);
                currentPlants = enrichAll();
            }
        };

        function updateDashboardMetrics() { currentPlants = enrichAll(); }

        function renderCurrentTab() {
            const content = document.getElementById('tab-content');
            if (!content) return;
            const renders = {
                dashboard: renderDashboard,
                emissions: renderEmissions,
                creditsim: renderCreditSim,
                regwatch: renderRegWatch,
                scopelink: renderScopeLink,
                tradedesk: renderTradeDesk,
                predictiq: renderPredictIQ,
                esgpulse: renderESGPulse
            };
            const fn = renders[activeTab];
            if (fn) { content.innerHTML = fn();
                content.className = 'fade-in'; }
            // Post-render charts
            setTimeout(() => {
                if (activeTab === 'dashboard') renderDashboardCharts();
                else if (activeTab === 'tradedesk') renderTradeDeskCharts();
                else if (activeTab === 'predictiq') renderPredictIQCharts([2026, 2027, 2028, 2029, 2030, 2031,
                    2032
                ].map((yr, i) => { const b = currentPlants.reduce((s, p) => s + p.total, 0); return { year: yr,
                        base: Math.round(b * (1 - i * 0.04)), optimistic: Math.round(b * (1 - i * 0.07)),
                        pessimistic: Math.round(b * (1 - i * 0.01)), target: Math.round(b * (1 - i * 0.055)) }; }));
                else if (activeTab === 'esgpulse') renderESGCharts();
            }, 80);
            // Alerts
            if (alertInterval) clearInterval(alertInterval);
            if (activeTab === 'dashboard' || activeTab === 'regwatch') {
                updateAlerts();
                alertInterval = setInterval(updateAlerts, 10000);
            }
        }

        function updateAlerts() {
            if (dynamicAlerts.length < 8) { dynamicAlerts.unshift(generateAlert()); } else { dynamicAlerts = [
                    generateAlert(), ...dynamicAlerts.slice(0, 7)
                ]; }
            const el = document.getElementById('alertContainer') || document.getElementById('regAlertList');
            if (!el) return;
            el.innerHTML = dynamicAlerts.slice(0, 6).map(a => `<div class="alert-item alert-${a.severity}">
      <i class="fas ${a.severity==='high'?'fa-triangle-exclamation':a.severity==='medium'?'fa-bell':'fa-circle-info'}" style="color:${a.severity==='high'?'#f87171':a.severity==='medium'?'#fbbf24':'#60a5fa'};margin-top:2px;font-size:0.8rem;flex-shrink:0;"></i>
      <div><div style="font-size:0.76rem;font-weight:600;color:#e2e8f0;">${a.msg}</div><div style="font-size:0.64rem;color:#64748b;">${a.timestamp}</div></div>
    </div>`).join('');
        }

        // ---- PDF ----
        async function generatePDFReport() {
            const m = document.createElement('div');
            m.className = 'modal-backdrop';
            m.innerHTML =
                `<div class="modal-box"><h2 style="font-size:1.2rem;font-weight:800;color:#4ade80;margin-bottom:0.5rem;"><i class="fas fa-file-pdf"></i> Generate Compliance Report</h2><p style="font-size:0.78rem;color:#94a3b8;margin-bottom:0.75rem;">Includes all facilities, emissions data, credit positions and charts.</p><div style="display:flex;gap:0.6rem;"><button id="cpdf" class="btn-primary" style="flex:1;justify-content:center;">Download PDF</button><button id="xpdf" class="btn-ghost" style="flex:1;">Cancel</button></div></div>`;
            document.body.appendChild(m);
            m.querySelector('#xpdf').onclick = () => m.remove();
            m.querySelector('#cpdf').onclick = async () => {
                m.remove();
                const d = document.createElement('div');
                d.style.cssText =
                    'position:fixed;left:-9999px;padding:24px;background:white;width:900px;font-family:sans-serif;color:#111;';
                const total = currentPlants.reduce((s, p) => s + p.total, 0);
                const fin = currentPlants.reduce((s, p) => s + p.credit.financialValue, 0);
                d.innerHTML =
                    `<div style="border-bottom:3px solid #1e6f5c;padding-bottom:12px;margin-bottom:16px;"><h1 style="color:#1e6f5c;font-size:24px;margin:0;">CarbonScope360</h1><p style="color:#666;font-size:12px;margin:4px 0 0;">Avalanche Consulting & Management Services, LLC · ${new Date().toLocaleString()}</p></div>
      <h3 style="color:#1e6f5c;">Portfolio Summary</h3>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;">
        <tr style="background:#f0fdf4;"><th style="padding:6px;text-align:left;border:1px solid #d1fae5;">Facility</th><th style="padding:6px;border:1px solid #d1fae5;">Total CO₂e</th><th style="padding:6px;border:1px solid #d1fae5;">Scope 1</th><th style="padding:6px;border:1px solid #d1fae5;">Scope 2</th><th style="padding:6px;border:1px solid #d1fae5;">Scope 3</th><th style="padding:6px;border:1px solid #d1fae5;">Net Credits</th><th style="padding:6px;border:1px solid #d1fae5;">Value</th></tr>
        ${currentPlants.map(p=>`<tr><td style="padding:6px;border:1px solid #eee;">${p.name}</td><td style="padding:6px;border:1px solid #eee;text-align:right;">${p.total.toLocaleString()}</td><td style="padding:6px;border:1px solid #eee;text-align:right;">${p.scope1.toLocaleString()}</td><td style="padding:6px;border:1px solid #eee;text-align:right;">${p.scope2.toLocaleString()}</td><td style="padding:6px;border:1px solid #eee;text-align:right;">${p.s3.total.toLocaleString()}</td><td style="padding:6px;border:1px solid #eee;text-align:right;color:${p.credit.surplusMT>=0?'green':'red'};">${p.credit.surplusMT>=0?'+':''}${p.credit.surplusMT.toLocaleString()}</td><td style="padding:6px;border:1px solid #eee;text-align:right;color:${p.credit.financialValue>=0?'green':'red'};">$${p.credit.financialValue.toLocaleString()}</td></tr>`).join('')}
        <tr style="background:#f0fdf4;font-weight:bold;"><td style="padding:6px;border:1px solid #d1fae5;">TOTAL</td><td style="padding:6px;border:1px solid #d1fae5;text-align:right;">${total.toLocaleString()}</td><td colspan="3" style="padding:6px;border:1px solid #d1fae5;"></td><td style="padding:6px;border:1px solid #d1fae5;text-align:right;color:${fin>=0?'green':'red'};">$${fin.toLocaleString()}</td><td></td></tr>
      </table>
      <p style="font-size:10px;color:#999;border-top:1px solid #eee;padding-top:8px;">Carbon Price: $${globalCarbonPrice}/MT · EPA 40 CFR Part 98 · GHG Protocol · IPCC AR6 GWPs · Generated by CarbonScope360</p>`;
                document.body.appendChild(d);
                try {
                    const cv = await html2canvas(d, { scale: 2 });
                    const img = cv.toDataURL('image/png');
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    pdf.addImage(img, 'PNG', 0, 0, 210, (cv.height * 210) / cv.width);
                    pdf.save(`CarbonScope360_Report_${new Date().toISOString().slice(0,10)}.pdf`);
                } catch (e) { alert('PDF error: ' + e); }
                d.remove();
            };
        }
        window.generatePDFReport = generatePDFReport;

        // ---- SETTINGS ----
        function showSettingsModal() {
            const m = document.createElement('div');
            m.className = 'modal-backdrop';
            m.innerHTML =
                `<div class="modal-box"><h2 style="font-size:1.2rem;font-weight:800;color:#4ade80;margin-bottom:0.75rem;"><i class="fas fa-sliders-h"></i> Platform Settings</h2>
      <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <label style="font-size:0.78rem;color:#94a3b8;">Global Carbon Price ($/MT)<input type="number" id="s-price" value="${globalCarbonPrice}" class="form-input" style="margin-top:3px;"></label>
        <label style="font-size:0.78rem;color:#94a3b8;">Monte Carlo Simulation Paths<input type="number" id="s-mc" value="${settings.monteCarloSamples}" class="form-input" style="margin-top:3px;"></label>
        <label style="display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#94a3b8;cursor:pointer;"><input type="checkbox" id="s-alerts" ${settings.autoRefreshAlerts?'checked':''} style="accent-color:#4ade80;"> Auto-refresh RegWatch alerts</label>
        <div style="display:flex;gap:0.6rem;margin-top:0.25rem;"><button id="s-save" class="btn-primary" style="flex:1;justify-content:center;">Save Changes</button><button id="s-cancel" class="btn-ghost" style="flex:1;">Cancel</button></div>
      </div></div>`;
            document.body.appendChild(m);
            m.querySelector('#s-cancel').onclick = () => m.remove();
            m.querySelector('#s-save').onclick = () => {
                const np = parseFloat(m.querySelector('#s-price').value);
                if (!isNaN(np)) { globalCarbonPrice = np;
                    document.getElementById('hdr-price').innerText = '$' + np; }
                const ns = parseInt(m.querySelector('#s-mc').value);
                if (!isNaN(ns)) settings.monteCarloSamples = ns;
                settings.autoRefreshAlerts = m.querySelector('#s-alerts').checked;
                currentPlants = enrichAll();
                m.remove();
                renderCurrentTab();
            };
        }
        window.showSettingsModal = showSettingsModal;

        // ---- HELP ----
        function showHelpModal() {
            const m = document.createElement('div');
            m.className = 'modal-backdrop';
            m.innerHTML =
                `<div class="modal-box"><h2 style="font-size:1.2rem;font-weight:800;color:#4ade80;margin-bottom:0.5rem;"><i class="fas fa-circle-question"></i> CarbonScope360 Help</h2>
      <p style="font-size:0.74rem;color:#64748b;margin-bottom:0.75rem;">Avalanche Consulting & Management Services, LLC · EPA 40 CFR Part 98 · GHG Protocol</p>
      <div style="display:flex;flex-direction:column;gap:0.5rem;font-size:0.78rem;">
        ${[
          ['fa-chart-line','Dashboard','Live KPIs, interactive charts, facility matrix, emission intensity benchmarks, live alerts.'],
          ['fa-microchip','EmissionsCore™','Edit plant-level data (fuel, electricity, process) for real-time Scope 1+2 recalculation. EPA-aligned.'],
          ['fa-dice','CreditSimulator™','Monte Carlo simulation: production, regulatory, price volatility, supplier data quality, offset costs.'],
          ['fa-shield-halved','RegWatch™','Compliance progress: EPA, SEC, UK SECR, CDP, AB 1305, CBAM, ISO 14064, GRI 305.'],
          ['fa-link','ScopeLink™','Enter primary supplier emission data to override EEIO defaults and improve Scope 3 accuracy.'],
          ['fa-arrow-right-arrow-left','TradeDesk™','Submit and track carbon credit buy/sell orders. Linked to Xpansiv CBL & CME. Audit trail.'],
          ['fa-brain','PredictIQ™','AI-powered emission forecasts 2026–2032 using LSTM + Random Forest. Decarbonization recommendations.'],
          ['fa-leaf','ESGPulse™','GRI 305, TCFD scenario analysis, CDP/SEC exports, industry breakdowns, Scope 3 categories.'],
        ].map(([icon,name,desc])=>`<div style="display:flex;gap:8px;background:rgba(0,0,0,0.2);padding:0.55rem;border-radius:10px;">
          <i class="fas ${icon}" style="color:#4ade80;margin-top:2px;width:12px;flex-shrink:0;"></i>
          <div><strong style="color:#e2e8f0;">${name}</strong> — <span style="color:#94a3b8;">${desc}</span></div>
        </div>`).join('')}
      </div>
      <button onclick="this.closest('.modal-backdrop').remove()" class="btn-ghost" style="width:100%;margin-top:0.75rem;text-align:center;">Close</button>
    </div>`;
            document.body.appendChild(m);
        }
        window.showHelpModal = showHelpModal;

        // ====================================================
        // ANIMATED BACKGROUND
        // ====================================================
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [];

            function resize() { W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', resize);
            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                    this.r = Math.random() * 1.5 + 0.3;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.alpha = Math.random() * 0.5 + 0.1;
                    this.color = Math.random() > 0.6 ? 'rgba(74,222,128,' : 'rgba(34,211,238,';
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset();
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + this.alpha + ')';
                    ctx.fill();
                }
            }
            for (let i = 0; i < 180; i++) particles.push(new Particle());
            const orbs = [
                { x: W * 0.15, y: H * 0.2, r: 150, vx: 0.08, vy: 0.04, color: 'rgba(30,111,92,0.06)' },
                { x: W * 0.8, y: H * 0.7, r: 200, vx: -0.06, vy: 0.05, color: 'rgba(10,50,80,0.05)' },
                { x: W * 0.5, y: H * 0.5, r: 120, vx: 0.04, vy: -0.06, color: 'rgba(74,222,128,0.03)' },
            ];

            function drawConnections() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x,
                            dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(30,111,92,${0.08*(1-dist/100)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, W, H);
                orbs.forEach(o => {
                    o.x += o.vx;
                    o.y += o.vy;
                    if (o.x < -o.r || o.x > W + o.r) o.vx *= -1;
                    if (o.y < -o.r || o.y > H + o.r) o.vy *= -1;
                    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
                    g.addColorStop(0, o.color);
                    g.addColorStop(1, 'transparent');
                    ctx.beginPath();
                    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                    ctx.fillStyle = g;
                    ctx.fill();
                });
                drawConnections();
                particles.forEach(p => { p.update();
                    p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ====================================================
        // INIT
        // ====================================================
        currentPlants = enrichAll();
        for (let i = 0; i < 5; i++) dynamicAlerts.push(generateAlert());

        document.getElementById('tabs-bar').addEventListener('click', e => {
            const btn = e.target.closest('[data-tab]');
            if (!btn) return;
            activeTab = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
            renderCurrentTab();
        });

        renderCurrentTab();
        window.addEventListener('resize', () => {
            // Refresh charts on resize for the active tab
            if (activeTab === 'dashboard') renderDashboardCharts();
            else if (activeTab === 'tradedesk') renderTradeDeskCharts();
            else if (activeTab === 'predictiq') renderPredictIQCharts([2026, 2027, 2028, 2029, 2030, 2031, 2032].map((
                yr, i) => { const b = currentPlants.reduce((s, p) => s + p.total, 0); return { year: yr, base: Math
                        .round(b * (1 - i * 0.04)), optimistic: Math.round(b * (1 - i * 0.07)),
                    pessimistic: Math.round(b * (1 - i * 0.01)), target: Math.round(b * (1 - i * 0.055)) }; }));
            else if (activeTab === 'esgpulse') renderESGCharts();
            else if (activeTab === 'creditsim' && window.runSimFn) window.runSimFn();
        });
    </script>
</body>
</html>
