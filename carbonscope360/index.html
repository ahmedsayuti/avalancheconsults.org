<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:title" content="CarbonScope360 | Enterprise Carbon Intelligence">
    <meta property="og:description" content="Real‑time carbon accounting, credit simulations, and compliance tracking by Avalanche Consulting & Management Services, LLC.">
    <meta property="og:image" content="https://www.avalancheconsults.org/assets/images/carbonscope360.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.avalancheconsults.org/carbonscope360/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="CarbonScope360 | Enterprise Carbon Intelligence">
    <meta name="twitter:description" content="Real‑time carbon accounting, credit simulations, and compliance tracking.">
    <meta name="twitter:image" content="https://www.avalancheconsults.org/assets/images/carbonscope360.png">

    <!-- Generic link image -->
    <link rel="image_src" href="https://www.avalancheconsults.org/assets/images/carbonscope360.png">

    <title>CarbonScope360 | Enterprise Carbon Intelligence</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%231e6f5c'/%3E%3Ctext x='50' y='68' font-size='48' text-anchor='middle' fill='white'%3E🌿%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            background: #020f0a;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Animated background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at 20% 20%, rgba(16, 80, 50, 0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(10, 50, 80, 0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(2, 15, 10, 0.6) 0%, transparent 80%);
            pointer-events: none;
        }
        .grid-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image: linear-gradient(rgba(30, 111, 92, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 111, 92, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* Layout */
        #app {
            position: relative;
            z-index: 2;
            min-height: 100vh;
        }
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 0.75rem 3rem;
        }

        /* Header */
        .header {
            background: rgba(2, 15, 10, 0.85);
            border-bottom: 1px solid rgba(30, 111, 92, 0.3);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 0.6rem 0.75rem;
        }
        .logo-text {
            background: linear-gradient(135deg, #4ade80, #22d3ee, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
            display: inline-block;
            margin-right: 6px;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.4);
            }
        }
        .price-badge {
            background: rgba(30, 111, 92, 0.25);
            border: 1px solid rgba(74, 222, 128, 0.3);
            padding: 0.3rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            color: #4ade80;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e6f5c, #16a085);
            color: white;
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            min-height: 34px;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(30, 111, 92, 0.4);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 0.4rem 0.7rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 34px;
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }
        .btn-xs {
            padding: 0.25rem 0.55rem;
            font-size: 0.65rem;
            border-radius: 9999px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            transition: all 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .btn-xs:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        /* Tabs */
        .tabs-bar {
            display: flex;
            gap: 2px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tabs-bar::-webkit-scrollbar {
            display: none;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #64748b;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            min-height: 36px;
        }
        .tab-btn:hover {
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(30, 111, 92, 0.5), rgba(22, 160, 133, 0.3));
            color: #4ade80;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(30, 111, 92, 0.2);
        }

        /* Responsive grids */
        .resp-grid {
            display: grid;
            gap: 1rem;
        }
        .resp-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .resp-grid-2-1 {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }
        .resp-grid-1-2 {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1rem;
        }
        .resp-grid-320-1 {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1rem;
            align-items: start;
        }
        .resp-grid-auto {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
        }
        .resp-grid-kpi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 0.75rem;
        }
        .resp-grid-facility {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 0.75rem;
        }
        @media (max-width: 860px) {
            .resp-grid-2,
            .resp-grid-2-1,
            .resp-grid-1-2,
            .resp-grid-320-1 {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 600px) {
            .resp-grid-kpi {
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 0.5rem;
            }
            .resp-grid-auto {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 0.5rem;
            }
            .resp-grid-facility {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
        }

        /* Chart containers */
        .chart-wrap {
            position: relative;
            width: 100%;
            min-height: 240px;
        }
        .chart-wrap-sm {
            min-height: 200px;
        }
        .chart-wrap-lg {
            min-height: 300px;
        }
        @media (max-width: 768px) {
            .chart-wrap {
                min-height: 210px;
            }
            .chart-wrap-lg {
                min-height: 250px;
            }
        }
        @media (max-width: 480px) {
            .chart-wrap {
                min-height: 185px;
            }
            .chart-wrap-lg {
                min-height: 220px;
            }
        }

        /* Cards */
        .card {
            background: rgba(10, 25, 18, 0.75);
            border: 1px solid rgba(30, 111, 92, 0.2);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            transition: all 0.25s;
            padding: 1rem;
            overflow: hidden;
            min-width: 0;
        }
        .card:hover {
            border-color: rgba(74, 222, 128, 0.25);
            box-shadow: 0 0 30px rgba(30, 111, 92, 0.15);
        }
        .card-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }
        .card-title i {
            color: #4ade80;
            width: 16px;
            flex-shrink: 0;
        }

        /* Metric cards */
        .metric-card {
            background: rgba(10, 25, 18, 0.8);
            border: 1px solid rgba(30, 111, 92, 0.2);
            border-radius: 14px;
            padding: 0.85rem 0.9rem;
            position: relative;
            overflow: hidden;
            transition: all 0.25s;
        }
        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 3px 3px 0 0;
        }
        .metric-card.green::before {
            background: linear-gradient(90deg, #4ade80, #22d3ee);
        }
        .metric-card.blue::before {
            background: linear-gradient(90deg, #60a5fa, #818cf8);
        }
        .metric-card.amber::before {
            background: linear-gradient(90deg, #fbbf24, #f97316);
        }
        .metric-card.rose::before {
            background: linear-gradient(90deg, #f43f5e, #ec4899);
        }
        .metric-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        .metric-label {
            font-size: 0.68rem;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 5px;
        }
        .metric-value {
            font-size: clamp(1.1rem, 2.5vw, 1.5rem);
            font-weight: 800;
            line-height: 1.15;
        }
        .metric-sub {
            font-size: 0.68rem;
            color: #64748b;
            margin-top: 5px;
        }
        .metric-icon {
            position: absolute;
            right: 0.75rem;
            top: 0.85rem;
            font-size: 1.3rem;
            opacity: 0.13;
        }

        /* Alerts */
        .alert-item {
            padding: 0.6rem 0.8rem;
            border-radius: 10px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
            animation: slideRight 0.3s ease;
            font-size: 0.78rem;
        }
        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .alert-high {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
        }
        .alert-medium {
            background: rgba(245, 158, 11, 0.1);
            border-left: 3px solid #f59e0b;
        }
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid #3b82f6;
        }

        /* Progress bars */
        .progress-track {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.8s ease;
        }
        .fill-green {
            background: linear-gradient(90deg, #4ade80, #22d3ee);
        }
        .fill-blue {
            background: linear-gradient(90deg, #60a5fa, #818cf8);
        }
        .fill-amber {
            background: linear-gradient(90deg, #fbbf24, #f97316);
        }
        .fill-rose {
            background: linear-gradient(90deg, #f43f5e, #ec4899);
        }

        /* Tables */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
            width: 100%;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            min-width: 600px;
        }
        .data-table th {
            padding: 0.6rem 0.7rem;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
            white-space: nowrap;
        }
        .data-table td {
            padding: 0.6rem 0.7rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #cbd5e1;
            white-space: nowrap;
        }
        .data-table tr:hover td {
            background: rgba(30, 111, 92, 0.06);
        }

        /* Badges */
        .badge {
            padding: 0.12rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .badge-green {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }
        .badge-amber {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
        .badge-red {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .badge-blue {
            background: rgba(96, 165, 250, 0.1);
            color: #93c5fd;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        .badge-purple {
            background: rgba(167, 139, 250, 0.1);
            color: #c4b5fd;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        /* Form controls */
        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.45rem 0.6rem;
            color: #e2e8f0;
            font-size: 0.78rem;
            width: 100%;
            transition: border-color 0.2s;
            outline: none;
            min-height: 36px;
        }
        .form-input:focus {
            border-color: rgba(74, 222, 128, 0.4);
            background: rgba(30, 111, 92, 0.1);
        }
        select.form-input option {
            background-color: #0a1912;
            color: #e2e8f0;
        }
        .range-input {
            width: 100%;
            accent-color: #4ade80;
            cursor: pointer;
            min-height: 28px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-box {
            background: rgba(10, 25, 18, 0.97);
            border: 1px solid rgba(30, 111, 92, 0.35);
            border-radius: 20px;
            max-width: 560px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 1.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        /* Tooltip */
        [data-tip] {
            position: relative;
            cursor: help;
        }
        [data-tip]:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(2, 15, 10, 0.95);
            border: 1px solid rgba(30, 111, 92, 0.4);
            color: #e2e8f0;
            font-size: 0.7rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }

        .fade-in {
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(30, 111, 92, 0.4);
            border-radius: 9999px;
        }
        canvas {
            max-width: 100% !important;
        }
        .footer-bar {
            border-top: 1px solid rgba(30, 111, 92, 0.15);
            padding: 0.75rem 0;
            text-align: center;
            color: #1e4a38;
            font-size: 0.68rem;
        }

        @media (max-width: 600px) {
            .header {
                padding: 0.5rem 0.5rem;
            }
            .btn-primary,
            .btn-ghost {
                padding: 0.35rem 0.6rem;
                font-size: 0.7rem;
                gap: 3px;
                min-height: 30px;
            }
            .card {
                padding: 0.75rem;
                border-radius: 14px;
            }
            .card-title {
                font-size: 0.78rem;
                margin-bottom: 0.6rem;
            }
            .metric-card {
                padding: 0.7rem 0.75rem;
                border-radius: 12px;
            }
            .metric-label {
                font-size: 0.62rem;
            }
            .metric-value {
                font-size: 1.1rem;
            }
            .metric-sub {
                font-size: 0.62rem;
            }
            .metric-icon {
                font-size: 1.1rem;
                right: 0.5rem;
                top: 0.6rem;
            }
            .footer-bar {
                font-size: 0.62rem;
                padding: 0.6rem 0;
            }
            .alert-item {
                font-size: 0.72rem;
                padding: 0.5rem 0.6rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="bg-overlay"></div>
    <div class="grid-lines"></div>

    <div id="app">
        <header class="header">
            <div style="max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;">
                <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
                    <div>
                        <div style="display:flex;align-items:center;gap:6px;">
                            <span class="logo-text">CarbonScope360</span>
                            <span class="badge badge-green" style="font-size:0.6rem;">LIVE</span>
                        </div>
                        <div style="font-size:0.62rem;color:#1e6f5c;margin-top:1px;">by Avalanche Consulting &amp; Management Services, LLC</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                    <div style="display:flex;align-items:center;gap:5px;" class="price-badge">
                        <span class="live-dot"></span>
                        Carbon Price: <span id="hdr-price" style="font-weight:800;">$42</span>/MT
                    </div>
                    <button class="btn-primary" onclick="generatePDFReport()"><i class="fas fa-file-pdf"></i> <span>PDF Report</span></button>
                    <button class="btn-ghost" onclick="showSettingsModal()"><i class="fas fa-sliders-h"></i></button>
                    <button class="btn-ghost" onclick="showHelpModal()"><i class="fas fa-circle-question"></i></button>
                </div>
            </div>
        </header>

        <div class="main-wrapper" style="padding-top:1rem;">
            <div class="tabs-bar" style="margin-bottom:1.25rem;" id="tabs-bar">
                <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button class="tab-btn" data-tab="emissions"><i class="fas fa-microchip"></i> EmissionsCore™</button>

                let s1 = (c.ng * EF.ng_kgCO2_per_MMBtu / 1000 + c.diesel * EF.diesel_kgCO2_per_gal / 1000) * EF.combustionUplift + c.process;
                let s2 = c.elec * EF.elec_MT_per_MWh;
                return { scope1: Math.round(s1 * 10) / 10, scope2: Math.round(s2 * 10) / 10, total12: Math.round((s1 + s2) * 10) / 10 };
            }

            function computeScope3(c) {
                const sup = supplierMaster[c.id] || {};
                let purchased = c.s3p !== null ? c.s3p : (sup.purchased?.primaryMT !== null && sup.purchased?.primaryMT != null ? sup.purchased.primaryMT : c.revenueMil * EF.s3_purchased);

                let other = c.s3o || c.revenueMil * EF.s3_other;
                return { purchased: Math.round(purchased), freight: Math.round(freight), useOfSold: Math.round(useSold), other: Math.round(other), total: Math.round(purchased + freight + useSold + other) };
            }

            function getCredit(plant, totalEm, price) {

                return { surplusMT: Math.round(bal * 10) / 10, financialValue: Math.round(bal * price), status: bal >= 0 ? 'Surplus' : 'Deficit' };

                    const s3 = computeScope3(c);

                    const bench = benchmarks[c.industry] || 65;

                    return { ...c, scope1, scope2, total12, s3, total, credit, intensity: Math.round(intensity * 10) / 10, benchmark: bench, efficiency };

            function runMonteCarlo(prodChange, regTightening, priceVol, supplierQuality, offsetCost, samples = 500) {
                const totalAllowanceBase = currentPlants.reduce((s, p) => s + p.allowance, 0);
                const totalEmissionsBase = currentPlants.reduce((s, p) => s + p.total, 0);
                const scope3Portion = currentPlants.reduce((s, p) => s + p.s3.total, 0);
                const scope12Portion = totalEmissionsBase - scope3Portion;
                let results = [];
                for (let i = 0; i < samples; i++) {
                    let prodN = 1 + (prodChange / 100) + (Math.random() - 0.5) * 0.05;
                    let regN = 1 - (regTightening / 100) + (Math.random() - 0.5) * 0.02;
                    let priceN = globalCarbonPrice * (1 + priceVol / 100) * (0.9 + Math.random() * 0.2);
                    let supN = 1 - (supplierQuality / 100) * 0.15 + (Math.random() - 0.5) * 0.03;
                    let em = (scope12Portion * prodN) + (scope3Portion * prodN * supN);
                    let all = totalAllowanceBase * regN;
                    let net = all - em;
                    let fin = net * priceN - (net < 0 ? Math.abs(net) * offsetCost : 0);
                    results.push({ netCredit: net, financial: fin, emissions: em });
                }
                results.sort((a, b) => a.netCredit - b.netCredit);
                return {
                    p10: results[Math.floor(samples * 0.1)],
                    p50: results[Math.floor(samples * 0.5)],
                    p90: results[Math.floor(samples * 0.9)],
                    meanCredit: results.reduce((s, r) => s + r.netCredit, 0) / samples,
                    deficitProbability: results.filter(r => r.netCredit < 0).length / samples,
                    samples: results
                };
            }

                config.options.plugins = Object.assign({

                return `<div class="fade-in"><div style="margin-bottom:0.75rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><div class="card-title" style="margin:0;"><i class="fas fa-microchip"></i> EmissionsCore™ Calculation Engine</div><span class="badge badge-green">EPA 40 CFR Part 98</span><span class="badge badge-blue">IPCC AR6 GWPs</span><span class="badge badge-purple">Real-time</span></div><div style="display:flex;flex-direction:column;gap:0.75rem;">${currentPlants.map(p=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem;"><div><div style="font-weight:700;font-size:0.95rem;color:#e2e8f0;">${p.name}</div><div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;"><span class="badge badge-blue">${p.industry}</span><span class="badge ${p.efficiency==='Efficient'?'badge-green':p.efficiency==='Inefficient'?'badge-red':'badge-amber'}">${p.efficiency}</span><span class="badge badge-purple" data-tip="Total incl. Scope 3">${p.total.toLocaleString()} MT CO₂e</span></div></div><div style="text-align:right;font-size:0.72rem;color:#64748b;">Intensity: <strong style="color:${p.intensity<=p.benchmark*0.9?'#4ade80':p.intensity>=p.benchmark*1.1?'#f87171':'#fbbf24'};">${p.intensity} kg/unit</strong> vs ${p.benchmark} benchmark</div></div><div class="resp-grid-auto" style="margin-bottom:0.75rem;"><label style="font-size:0.74rem;color:#94a3b8;">Natural Gas (MMBtu)<input type="number" value="${p.ng}" onchange="updatePlantField('${p.id}','ng',parseFloat(this.value)||0)" class="form-input" style="margin-top:3px;"></label><label style="font-size:0.74rem;color:#94a3b8;">Electricity (MWh)<input type="number" value="${p.elec}" onchange="updatePlantField('${p.id}','elec',parseFloat(this.value)||0)" class="form-input" style="margin-top:3px;"></label><label style="font-size:0.74rem;color:#94a3b8;">Diesel (gal)<input type="number" value="${p.diesel}" onchange="updatePlantField('${p.id}','diesel',parseFloat(this.value)||0)" class="form-input" style="margin-top:3px;"></label><label style="font-size:0.74rem;color:#94a3b8;">Process Emissions (MT)<input type="number" value="${p.process}" onchange="updatePlantField('${p.id}','process',parseFloat(this.value)||0)" class="form-input" style="margin-top:3px;"></label><label style="font-size:0.74rem;color:#94a3b8;">Production Units<input type="number" value="${p.prodUnits}" onchange="updatePlantField('${p.id}','prodUnits',parseFloat(this.value)||1)" class="form-input" style="margin-top:3px;"></label></div><div class="resp-grid-auto" style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.6rem;font-size:0.72rem;"><div style="text-align:center;"><div style="color:#64748b;">Scope 1</div><div style="font-weight:700;color:#60a5fa;">${p.scope1.toLocaleString()} MT</div></div><div style="text-align:center;"><div style="color:#64748b;">Scope 2</div><div style="font-weight:700;color:#22d3ee;">${p.scope2.toLocaleString()} MT</div></div><div style="text-align:center;"><div style="color:#64748b;">Scope 3</div><div style="font-weight:700;color:#4ade80;">${p.s3.total.toLocaleString()} MT</div></div><div style="text-align:center;"><div style="color:#64748b;">Allowance</div><div style="font-weight:700;color:#fbbf24;">${p.allowance.toLocaleString()} MT</div></div><div style="text-align:center;"><div style="color:#64748b;">Net Position</div><div style="font-weight:700;color:${p.credit.surplusMT>=0?'#4ade80':'#f87171'};">${p.credit.surplusMT>=0?'+':''}${p.credit.surplusMT.toLocaleString()} MT</div></div><div style="text-align:center;"><div style="color:#64748b;">Credit Value</div><div style="font-weight:700;color:${p.credit.financialValue>=0?'#4ade80':'#f87171'};">$${p.credit.financialValue.toLocaleString()}</div></div></div></div>`).join('')}</div></div>`;
            }

            function renderCreditSim() {
                const totalAllowance = currentPlants.reduce((s,p)=>s+p.allowance,0);
                const totalEmissions = currentPlants.reduce((s,p)=>s+p.total,0);
                const currentNetCredit = totalAllowance - totalEmissions;
                const currentFinancial = currentNetCredit * globalCarbonPrice;
                setTimeout(()=>{
                    const sliders = ['simProd','simReg','simVol','simSup','simOffset'];
                    sliders.forEach(id => document.getElementById(id)?.addEventListener('input', runSimFn));
                    document.getElementById('runSimBtn')?.addEventListener('click', runSimFn);
                    runSimFn();
                },120);
                function runSimFn(){
                    const prod=+document.getElementById('simProd')?.value||0, reg=+document.getElementById('simReg')?.value||0, vol=+document.getElementById('simVol')?.value||0, sup=+document.getElementById('simSup')?.value||50, off=+document.getElementById('simOffset')?.value||25;
                    ['Prod','Reg','Vol','Sup','Offset'].forEach((n,i)=>{const el=document.getElementById('simVal'+n); if(el) el.innerText=[prod,reg,vol,sup,off][i];});
                    const mc = runMonteCarlo(prod,reg,vol,sup,off,settings.monteCarloSamples);
                    const fmt=v=>`${v>=0?'+':''}${Math.round(v).toLocaleString()} MT`;
                    setEl('res-mean',fmt(mc.meanCredit),mc.meanCredit>=0?'#4ade80':'#f87171');
                    setEl('res-p10',fmt(mc.p10.netCredit),mc.p10.netCredit>=0?'#4ade80':'#f87171');
                    setEl('res-p90',fmt(mc.p90.netCredit),mc.p90.netCredit>=0?'#4ade80':'#f87171');
                    setEl('res-deficit',`${(mc.deficitProbability*100).toFixed(1)}%`,mc.deficitProbability>0.3?'#f87171':'#fbbf24');
                    setEl('res-fin',`$${Math.round(mc.p50.financial).toLocaleString()}`,'#4ade80');
                    const credits=mc.samples.map(r=>r.netCredit);
                    const mn=Math.min(...credits),mx=Math.max(...credits),step=(mx-mn)/20;
                    const bins=[];
                    for(let i=0;i<20;i++){const lo=mn+i*step;bins.push({lo,count:credits.filter(c=>c>=lo&&c<lo+step).length});}
                    mkChart('distChart',{type:'bar',data:{labels:bins.map(b=>Math.round(b.lo).toLocaleString()),datasets:[{label:'Scenarios',data:bins.map(b=>b.count),backgroundColor:bins.map(b=>b.lo<0?'rgba(248,113,113,0.7)':'rgba(74,222,128,0.7)'),borderRadius:2}]},options:{scales:{x:{display:false},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#64748b',font:{size:8}}}},plugins:{legend:{display:false}}}});
                }
                window.runSimFn = runSimFn;
                function setEl(id,val,color){const el=document.getElementById(id); if(el){el.innerText=val;el.style.color=color||'#e2e8f0';}}
                return `<div class="fade-in"><div class="resp-grid-320-1"><div class="card"><div class="card-title"><i class="fas fa-sliders-h"></i> Simulation Controls</div><div style="display:flex;flex-direction:column;gap:0.75rem;">${[{id:'simProd',label:'Production change (%)',min:-30,max:50,val:0,key:'Prod'},{id:'simReg',label:'Regulatory tightening (%)',min:0,max:30,val:0,key:'Reg'},{id:'simVol',label:'Carbon price volatility (%)',min:-30,max:50,val:0,key:'Vol'},{id:'simSup',label:'Supplier data quality (%)',min:0,max:100,val:50,key:'Sup'},{id:'simOffset',label:'Offset cost ($/MT)',min:0,max:100,val:25,key:'Offset'}].map(s=>`<div><div style="display:flex;justify-content:space-between;font-size:0.74rem;margin-bottom:3px;"><span style="color:#94a3b8;" data-tip="${s.hint||''}">${s.label}</span><span style="color:#4ade80;font-weight:700;" id="simVal${s.key}">${s.val}</span></div><input type="range" class="range-input" id="${s.id}" min="${s.min}" max="${s.max}" value="${s.val}"></div>`).join('')}<button id="runSimBtn" class="btn-primary" style="width:100%;justify-content:center;padding:0.55rem;"><i class="fas fa-play"></i> Run Monte Carlo (${settings.monteCarloSamples} paths)</button></div></div><div style="display:flex;flex-direction:column;gap:1rem;"><div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> Simulation Results</div><div class="resp-grid-auto" style="margin-bottom:0.75rem;"><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">Current Net Credit</div><div style="font-size:1.15rem;font-weight:800;color:${currentNetCredit>=0?'#4ade80':'#f87171'};">${currentNetCredit>=0?'+':''}${Math.round(currentNetCredit).toLocaleString()} MT</div><div style="font-size:0.65rem;color:#64748b;">$${currentFinancial.toLocaleString()}</div></div><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">Mean Projected</div><div style="font-size:1.15rem;font-weight:800;" id="res-mean">—</div></div><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">Deficit Probability</div><div style="font-size:1.15rem;font-weight:800;" id="res-deficit">—</div></div><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">P10 (Pessimistic)</div><div style="font-size:1rem;font-weight:700;" id="res-p10">—</div></div><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">P90 (Optimistic)</div><div style="font-size:1rem;font-weight:700;" id="res-p90">—</div></div><div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.7rem;text-align:center;"><div style="font-size:0.65rem;color:#64748b;margin-bottom:3px;">Median Financial</div><div style="font-size:1rem;font-weight:700;" id="res-fin">—</div></div></div><div style="font-size:0.76rem;color:#94a3b8;margin-bottom:6px;font-weight:600;">Probability Distribution of Net Credit Position</div><div class="chart-wrap-sm"><canvas id="distChart"></canvas></div><div style="font-size:0.66rem;color:#374151;margin-top:6px;background:rgba(0,0,0,0.2);padding:0.5rem;border-radius:8px;">🎲 ${settings.monteCarloSamples} Monte Carlo paths · Green bars = surplus · Red bars = deficit</div></div><div class="resp-grid-2"><div class="card"><div class="card-title"><i class="fas fa-lightbulb"></i> Key Drivers</div><div style="font-size:0.74rem;color:#94a3b8;line-height:1.5;"><div>🔺 Production +10% → emissions +10% → deficit risk ↑</div><div>🔻 Reg tightening 15% → allowance cap shrinks → deficit risk ↑↑</div><div>📊 Better supplier data → narrower Scope 3 range → less uncertainty</div><div>💰 Price +20% → surplus value up, deficit cost up proportionally</div></div></div><div class="card"><div class="card-title"><i class="fas fa-history"></i> Historical Context</div><div style="font-size:0.74rem;line-height:1.6;"><div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">2024 actual</span><span style="color:#4ade80;font-weight:600;">+3,100 MT surplus</span></div><div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">2025 actual</span><span style="color:#4ade80;font-weight:600;">+3,750 MT surplus</span></div><div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">2026 current</span><span style="color:${currentNetCredit>=0?'#4ade80':'#f87171'};font-weight:700;">${currentNetCredit>=0?'+':''}${Math.round(currentNetCredit).toLocaleString()} MT</span></div><div style="display:flex;justify-content:space-between;"><span style="color:#64748b;">2027 base projection</span><span style="color:#fbbf24;font-weight:600;">+4,850 MT</span></div></div></div></div></div></div></div>`;
            }

            // ===============================================
            // SCOPELINK ENHANCED
            // ===============================================
            function renderScopeLink() {
                currentPlants = enrichAll();
                let total=0, responded=0, totalDef=0, totalPri=0;
                let facilityStats = [];
                for (let cid in supplierMaster) {
                    let facDef=0, facPri=0, facResp=0, facTotal=0;
                    for (let cat in supplierMaster[cid]) {
                        total++; facTotal++;
                        const s = supplierMaster[cid][cat];
                        totalDef += s.defaultMT;
                        facDef += s.defaultMT;
                        if (s.primaryMT != null) { responded++; facResp++; totalPri += s.primaryMT; facPri += s.primaryMT; }
                    }
                    const co = currentPlants.find(p=>p.id===cid);
                    facilityStats.push({ id:cid, name:co?co.name:cid, total:facTotal, responded:facResp, defaultMT:facDef, primaryMT:facPri, coverage:facDef>0?Math.round((facPri/facDef)*100):0, categories:supplierMaster[cid] });
                }
                const rate = Math.round((responded/total)*100);
                const coverage = totalDef>0 ? Math.round((totalPri/totalDef)*100) : 0;
                const uncertaintyReduction = Math.round(coverage*0.65);
                const qualityScore = Math.round((rate*0.5)+(coverage*0.5));
                setTimeout(()=>renderScopeLinkCharts(facilityStats),100);
                return `<div class="fade-in">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:0.75rem;flex-wrap:wrap;">
                        <div class="card-title" style="margin:0;"><i class="fas fa-link"></i> ScopeLink™ Supplier Data Hub</div>
                        <span class="badge badge-green">EEIO v2.1</span><span class="badge badge-blue">GHG Protocol Scope 3</span><span class="badge badge-purple">CDP Supply Chain</span>
                        <button class="btn-xs" onclick="requestAllPending()" style="margin-left:auto;color:#4ade80;border-color:rgba(74,222,128,0.3);"><i class="fas fa-paper-plane"></i> Request All Pending</button>
                        <button class="btn-xs" onclick="alert('📥 Supplier data export initiated.')" style="color:#60a5fa;border-color:rgba(96,165,250,0.3);"><i class="fas fa-download"></i> Export Data</button>
                    </div>
                    <div class="resp-grid-auto" style="margin-bottom:1rem;">
                        <div class="metric-card green" style="padding:0.75rem;"><div class="metric-label">Suppliers Engaged</div><div class="metric-value" style="color:#4ade80;font-size:1.3rem;">${total}</div><div class="metric-sub">3 categories × 8 facilities</div></div>
                        <div class="metric-card amber" style="padding:0.75rem;"><div class="metric-label">Response Rate</div><div class="metric-value" style="color:#fbbf24;font-size:1.3rem;">${rate}%</div><div class="metric-sub">${responded} of ${total} responded</div></div>
                        <div class="metric-card blue" style="padding:0.75rem;"><div class="metric-label">Primary Data Coverage</div><div class="metric-value" style="color:#60a5fa;font-size:1.3rem;">${coverage}%</div><div class="metric-sub">${totalPri.toLocaleString()} of ${totalDef.toLocaleString()} MT</div></div>
                        <div class="metric-card rose" style="padding:0.75rem;"><div class="metric-label">Uncertainty Reduction</div><div class="metric-value" style="color:#c4b5fd;font-size:1.3rem;">−${uncertaintyReduction}%</div><div class="metric-sub">Scope 3 range narrowed</div></div>
                        <div class="metric-card green" style="padding:0.75rem;"><div class="metric-label">Data Quality Score</div><div class="metric-value" style="color:#34d399;font-size:1.3rem;">${qualityScore}/100</div><div class="metric-sub">${qualityScore>=70?'Good · Audit-ready':qualityScore>=40?'Fair · Improving':'Low · Needs attention'}</div></div>
                        <div class="metric-card amber" style="padding:0.75rem;"><div class="metric-label">Default EEIO Total</div><div class="metric-value" style="color:#fbbf24;font-size:1.15rem;">${totalDef.toLocaleString()}</div><div class="metric-sub">MT CO₂e · All categories</div></div>
                    </div>
                    <div class="resp-grid-2" style="margin-bottom:1rem;">
                        <div class="card"><div class="card-title"><i class="fas fa-chart-bar"></i> Scope 3 Data: Default EEIO vs Primary Data by Facility</div><div class="chart-wrap-lg"><canvas id="slDataQualityChart"></canvas></div></div>
                        <div class="card"><div class="card-title"><i class="fas fa-check-circle"></i> Facility Engagement Progress</div><div style="display:flex;flex-direction:column;gap:0.6rem;max-height:340px;overflow-y:auto;">${facilityStats.map(f=>`<div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:0.65rem;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:4px;"><span style="font-weight:700;font-size:0.78rem;color:#e2e8f0;">${f.name.split(' ')[0]}</span><span class="badge ${f.coverage>=70?'badge-green':f.coverage>=30?'badge-amber':'badge-red'}">${f.responded}/${f.total} Responded</span></div><div class="progress-track" style="margin-bottom:4px;"><div class="progress-fill ${f.coverage>=70?'fill-green':f.coverage>=30?'fill-amber':'fill-rose'}" style="width:${Math.max(8,f.coverage)}%"></div></div><div style="display:flex;justify-content:space-between;font-size:0.66rem;color:#64748b;flex-wrap:wrap;gap:4px;"><span>Coverage: ${f.coverage}% · ${f.primaryMT.toLocaleString()} MT primary</span><button class="btn-xs" onclick="requestFacilityData('${f.id}')" style="color:#4ade80;"><i class="fas fa-paper-plane"></i> Request</button></div></div>`).join('')}</div></div>
                    </div>
                    <div class="card"><div class="card-title"><i class="fas fa-table"></i> Supplier Data Management Table</div><p style="font-size:0.72rem;color:#64748b;margin-bottom:0.75rem;">Enter primary supplier emission data to override EEIO defaults. Changes recalculate Scope 3 instantly.</p><div class="table-scroll"><table class="data-table"><thead><tr><th>Facility</th><th>Category</th><th>Supplier</th><th>Default EEIO (MT)</th><th>Primary Data (MT)</th><th>Variance</th><th>Status</th><th>Last Updated</th><th>Action</th></tr></thead><tbody>${Object.entries(supplierMaster).flatMap(([cid,cats])=>{const co=currentPlants.find(p=>p.id===cid);const nm=co?co.name:cid;return Object.entries(cats).map(([cat,supp])=>{const prim=supp.primaryMT;const def=supp.defaultMT;const variance=prim!=null?def-prim:0;const varStr=prim!=null?(variance>=0?'−':'+')+Math.abs(Math.round(variance)).toLocaleString()+' MT':'—';const varColor=prim!=null?(variance>=0?'#4ade80':'#f87171'):'#64748b';return`<tr><td style="font-weight:600;color:#e2e8f0;">${nm}</td><td><span class="badge badge-blue">${cat==='purchased'?'Purchased Goods':cat==='freight'?'Freight':'Use of Sold'}</span></td><td style="color:#94a3b8;">${supp.name}</td><td style="color:#fbbf24;">${def.toLocaleString()}</td><td><input type="number" value="${prim!=null?prim:''}" placeholder="Enter MT" class="form-input" style="width:100px;min-height:30px;" onchange="updateSupplierPrimary('${cid}','${cat}',this.value)"></td><td style="color:${varColor};font-weight:600;">${varStr}</td><td>${prim!=null?'<span class="badge badge-green">✓ Received</span>':'<span class="badge badge-amber">Pending</span>'}</td><td style="font-size:0.68rem;color:#64748b;">${supp.lastUpdated||'—'}</td><td><button onclick="requestSingleSupplier('${cid}','${cat}','${supp.name}')" class="btn-xs" style="color:#4ade80;"><i class="fas fa-paper-plane"></i> Request</button></td></tr>`;}).join('');}).join('')}</tbody></table></div></div></div>`;
            }

            function renderScopeLinkCharts(facilityStats) {
                if (activeTab !== 'scopelink') return;
                const labels = facilityStats.map(f => f.name.split(' ')[0]);
                mkChart('slDataQualityChart', {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [
                            { label: 'Default EEIO (MT)', data: facilityStats.map(f => f.defaultMT), backgroundColor: 'rgba(251,191,36,0.6)', borderRadius: 3 },
                            { label: 'Primary Data (MT)', data: facilityStats.map(f => f.primaryMT), backgroundColor: 'rgba(74,222,128,0.6)', borderRadius: 3 }
                        ]
                    },
                    options: {
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 8 }, maxRotation: 45 } },
                            y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 8 } } }
                        }
                    }
                });
            }

            window.requestAllPending = function() {
                let count=0;
                for (let cid in supplierMaster) for (let cat in supplierMaster[cid]) if (supplierMaster[cid][cat].primaryMT == null) count++;
                alert(`📧 Request sent to ${count} pending suppliers across all facilities.`);
            };
            window.requestFacilityData = function(cid) {
                const co = currentPlants.find(p=>p.id===cid);
                const name = co ? co.name : cid;
                let pending=0;
                for (let cat in supplierMaster[cid]) if (supplierMaster[cid][cat].primaryMT == null) pending++;
                alert(`📧 Request sent to ${pending} pending suppliers for ${name}.`);
            };
            window.requestSingleSupplier = function(cid, cat, name) {
                alert(`📧 Reminder sent to ${name} (${cat}) — awaiting primary emission data.`);
            };

            window.updateSupplierPrimary = function(cid, cat, val) {
                if (supplierMaster[cid] && supplierMaster[cid][cat]) {
                    supplierMaster[cid][cat].primaryMT = val === '' ? null : parseFloat(val);
                    supplierMaster[cid][cat].responseStatus = val !== '' ? 'responded' : 'pending';
                    supplierMaster[cid][cat].lastUpdated = new Date().toISOString().slice(0,10);
                    currentPlants = enrichAll();
                    if (activeTab === 'scopelink') renderCurrentTab();
                }
            };

            // ===============================================
            // TRADEDESK
            // ===============================================
            function renderTradeDesk() {
                const totalBought = tradeBook.filter(t=>t.type==='Buy').reduce((s,t)=>s+t.credits,0);

                            ['HIGH','Keystone Steel','Switch to DRI-EAF process — potential 35% Scope 1 reduction','$12.4M capex · 4yr payback'],
                            ['HIGH','Blue Ridge Cement','Increase CCUS capacity from 18% to 40% by 2028','$8.7M capex · REF Grant eligible'],
                            ['MED','Gulf Coast Chemicals','Electrify process heat via heat pumps + green H\u2082','$4.2M · IRA 45Q eligible'],
                            ['MED','Silicon Valley Semicon','Procure 100% RE via PPA — eliminates Scope 2','$0 capex · contract-based'],
                            ['MED','AutoDynamic Assembly','Improve Scope 3 supplier engagement to 75%+ response rate','Data-driven reduction'],
                            ['LOW','All Facilities','Implement ISO 50001 energy management system','$0.8M portfolio-wide'],
                        ];
                        const recCols=[{label:'Priority',w:16},{label:'Facility',w:44},{label:'Action',w:90},{label:'Financial Note',w:CW-150}];
                        y4=tableHeader(recCols,ML,y4,6.5);
                        recs.forEach((r,i)=>{
                            const pClr=r[0]==='HIGH'?C.rose:r[0]==='MED'?C.amber:C.accent;
                            y4=tableRow(recCols,[r[0],r[1],r[2],r[3]],ML,y4,7,i%2===0,[pClr,null,null,C.gray3]);
                        });

                        y4+=6;
                        y4=sectionTitle('Compliance Alerts & Regulatory Deadlines',y4);
                        const alerts=[
                            ['HIGH','Keystone Steel Scope 1 intensity 7% above EPA threshold — remediation plan required'],
                            ['HIGH','SEC climate disclosure: Scope 3 materiality review deadline approaching'],
                            ['HIGH','EPA proposed rule: stricter emission factors for refineries'],
                            ['MED','California AB 1305 carbon market disclosure – Q2 filing due Oct 1, 2026'],
                            ['MED','EU CBAM: embedded emissions verification for steel/cement exports – Dec 2026'],
                            ['MED','IRA Section 45Q guidance released – new qualification criteria to review'],
                            ['INFO','CDP questionnaire response window opens June 15 – 55% supplier data ready'],
                            ['INFO','ISO 14064-1 third-party verification engagement scheduled Q3 2026'],
                        ];
                        const alCols=[{label:'Severity',w:18},{label:'Alert Description',w:CW-18}];
                        y4=tableHeader(alCols,ML,y4,6.5);
                        alerts.forEach((a,i)=>{
                            const aClr=a[0]==='HIGH'?C.rose:a[0]==='MED'?C.amber:C.blue;
                            y4=tableRow(alCols,[a[0],a[1]],ML,y4,7,i%2===0,[aClr,null]);
                        });

                        // Disclaimer
                        y4+=8;
                        fill(C.bg); pdf.rect(ML,y4,CW,22,'F');
                        stroke(C.bgDk); pdf.setLineWidth(0.3); pdf.rect(ML,y4,CW,22,'D');
                        pdf.setFontSize(7); rgb(C.gray3); pdf.setFont('helvetica','italic');
                        const disc='This report was generated by CarbonScope360 (Avalanche Consulting & Management Services, LLC) using facility-level activity data, EPA 40 CFR Part 98 emission factors, IPCC AR6 GWPs, and the GHG Protocol Corporate Standard. Scope 3 categories use USEEIO v2.1 economic input-output defaults where primary supplier data is unavailable. Monte Carlo credit simulations are probabilistic projections only. This document does not constitute legal, financial, or regulatory compliance advice. All data is as of '+dateStr+'. Carbon price: $'+globalCarbonPrice+'/MT (Xpansiv CBL reference).';
                        const discLines=pdf.splitTextToSize(disc,CW-6);
                        discLines.forEach((line,i)=>{ pdf.text(line,ML+3,y4+4+i*4); });

                        prog.remove();
                        pdf.save(`CarbonScope360_Compliance_Report_${now.toISOString().slice(0,10)}.pdf`);

                    } catch(err){
                        prog.remove();
                        alert('PDF generation error: '+err.message);
                        console.error(err);
                    }
                };
            };

            window.showSettingsModal = function() {
                const m = document.createElement('div'); m.className='modal-backdrop';
                m.innerHTML=`<div class="modal-box"><h2 style="font-size:1.2rem;font-weight:800;color:#4ade80;"><i class="fas fa-sliders-h"></i> Platform Settings</h2><div style="display:flex;flex-direction:column;gap:0.75rem;"><label style="font-size:0.78rem;color:#94a3b8;">Global Carbon Price ($/MT)<input type="number" id="s-price" value="${globalCarbonPrice}" class="form-input"></label><label style="font-size:0.78rem;color:#94a3b8;">Monte Carlo Simulation Paths<input type="number" id="s-mc" value="${settings.monteCarloSamples}" class="form-input"></label><label style="display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#94a3b8;cursor:pointer;"><input type="checkbox" id="s-alerts" ${settings.autoRefreshAlerts?'checked':''} style="accent-color:#4ade80;"> Auto-refresh RegWatch alerts</label><div style="display:flex;gap:0.6rem;"><button id="s-save" class="btn-primary" style="flex:1;">Save Changes</button><button id="s-cancel" class="btn-ghost" style="flex:1;">Cancel</button></div></div></div>`;
                document.body.appendChild(m);
                m.querySelector('#s-cancel').onclick=()=>m.remove();
                m.querySelector('#s-save').onclick=()=>{
                    const np = parseFloat(m.querySelector('#s-price').value);
                    if (!isNaN(np)) { globalCarbonPrice=np; document.getElementById('hdr-price').innerText='$'+np; }
                    const ns = parseInt(m.querySelector('#s-mc').value);
                    if (!isNaN(ns)) settings.monteCarloSamples=ns;
                    settings.autoRefreshAlerts = m.querySelector('#s-alerts').checked;
                    currentPlants = enrichAll();
                    m.remove();
                    renderCurrentTab();
                };
            };

            window.showHelpModal = function() {
                const m = document.createElement('div'); m.className='modal-backdrop';
                m.innerHTML=`<div class="modal-box"><h2 style="font-size:1.2rem;font-weight:800;color:#4ade80;"><i class="fas fa-circle-question"></i> CarbonScope360 Help</h2><p style="font-size:0.74rem;color:#64748b;">Avalanche Consulting & Management Services, LLC · EPA 40 CFR Part 98 · GHG Protocol</p><div style="display:flex;flex-direction:column;gap:0.5rem;font-size:0.78rem;">${[['fa-chart-line','Dashboard','Live KPIs, interactive charts, facility matrix, live alerts.'],['fa-microchip','EmissionsCore™','Edit plant-level data for real-time Scope 1+2 recalculation.'],['fa-dice','CreditSimulator™','Monte Carlo simulation: production, regulatory, price volatility, offset costs.'],['fa-shield-halved','RegWatch™','Compliance progress: EPA, SEC, UK SECR, CDP, AB 1305, CBAM, ISO 14064.'],['fa-link','ScopeLink™','Manage supplier data, override EEIO defaults, improve Scope 3 accuracy.'],['fa-arrow-right-arrow-left','TradeDesk™','Submit and track carbon credit buy/sell orders.'],['fa-brain','PredictIQ™','AI-powered emission forecasts 2026–2032 with decarbonization recommendations.'],['fa-leaf','ESGPulse™','GRI 305, TCFD, CDP/SEC exports, Scope 3 category breakdowns.'],].map(([icon,name,desc])=>`<div style="display:flex;gap:8px;background:rgba(0,0,0,0.2);padding:0.55rem;border-radius:10px;"><i class="fas ${icon}" style="color:#4ade80;margin-top:2px;width:12px;"></i><div><strong style="color:#e2e8f0;">${name}</strong> — <span style="color:#94a3b8;">${desc}</span></div></div>`).join('')}</div><button onclick="this.closest('.modal-backdrop').remove()" class="btn-ghost" style="width:100%;margin-top:0.75rem;">Close</button></div>`;
                document.body.appendChild(m);
            };

            function renderRegWatch() {
                const regs = [{name:"EPA 40 CFR Part 98",prog:94,due:"Aug 31, 2026",status:"On Track",color:"green",icon:"fa-shield-halved",details:"8 facilities reporting · e-GGRT submission ready"},{name:"SEC Climate Disclosure (S-K 1500)",prog:71,due:"Annual 2026",status:"In Progress",color:"amber",icon:"fa-chart-line",details:"Scope 1&2 quantified · Scope 3 materiality review pending"},{name:"UK SECR",prog:100,due:"Filed Mar 2026",status:"Complete",color:"green",icon:"fa-check-circle",details:"Energy & carbon report submitted · LCP threshold met"},{name:"CDP Supply Chain",prog:55,due:"Jul 31, 2026",status:"In Progress",color:"amber",icon:"fa-link",details:"Supplier questionnaires 55% returned"},{name:"California AB 1305",prog:40,due:"Oct 1, 2026",status:"Needs Attention",color:"rose",icon:"fa-exclamation-triangle",details:"Carbon market disclosure — offset claims need verification"},{name:"EU CBAM (Steel/Cement)",prog:62,due:"Dec 31, 2026",status:"In Progress",color:"amber",icon:"fa-ship",details:"Embedded emissions data for Keystone Steel & Blue Ridge Cement"},{name:"ISO 14064-1 Audit",prog:30,due:"Q3 2026",status:"Scheduled",color:"blue",icon:"fa-certificate",details:"Third-party verification engagement in progress"},{name:"GRI Standards 305",prog:78,due:"Annual Report",status:"On Track",color:"green",icon:"fa-file-alt",details:"GHG data prepared · GRI index mapping 78% complete"}];
                return `<div class="fade-in"><div class="resp-grid-auto" style="margin-bottom:1rem;"><div class="metric-card green" style="padding:0.75rem;"><div class="metric-label">Frameworks Tracked</div><div class="metric-value" style="color:#4ade80;font-size:1.3rem;">8</div></div><div class="metric-card green" style="padding:0.75rem;"><div class="metric-label">Fully Filed</div><div class="metric-value" style="color:#4ade80;font-size:1.3rem;">2</div></div><div class="metric-card amber" style="padding:0.75rem;"><div class="metric-label">In Progress</div><div class="metric-value" style="color:#fbbf24;font-size:1.3rem;">4</div></div><div class="metric-card rose" style="padding:0.75rem;"><div class="metric-label">Needs Attention</div><div class="metric-value" style="color:#f87171;font-size:1.3rem;">1</div></div><div class="metric-card blue" style="padding:0.75rem;"><div class="metric-label">Avg Completion</div><div class="metric-value" style="color:#60a5fa;font-size:1.3rem;">${Math.round(regs.reduce((s,r)=>s+r.prog,0)/regs.length)}%</div></div></div><div class="resp-grid-2" style="margin-bottom:1rem;">${regs.map(r=>`<div class="card" style="padding:0.9rem;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:4px;"><div style="display:flex;align-items:center;gap:7px;"><i class="fas ${r.icon}" style="color:${r.color==='green'?'#4ade80':r.color==='amber'?'#fbbf24':r.color==='rose'?'#f87171':'#60a5fa'};width:14px;"></i><span style="font-size:0.8rem;font-weight:700;color:#e2e8f0;">${r.name}</span></div><span class="badge badge-${r.color==='green'?'green':r.color==='amber'?'amber':r.color==='rose'?'red':'blue'}">${r.status}</span></div><div class="progress-track" style="margin-bottom:5px;"><div class="progress-fill fill-${r.color==='green'?'green':r.color==='amber'?'amber':r.color==='rose'?'rose':'blue'}" style="width:${r.prog}%"></div></div><div style="display:flex;justify-content:space-between;font-size:0.68rem;color:#64748b;flex-wrap:wrap;gap:4px;"><span>${r.details}</span><span style="font-weight:700;color:${r.color==='green'?'#4ade80':r.color==='amber'?'#fbbf24':'#f87171'};">${r.prog}%</span></div><div style="font-size:0.66rem;color:#374151;margin-top:3px;">Due: ${r.due}</div></div>`).join('')}</div><div class="card"><div class="card-title"><i class="fas fa-bell"></i> Active Compliance Alerts</div><div id="regAlertList" style="display:flex;flex-direction:column;gap:6px;"></div></div></div>`;
            }

            // Init
            currentPlants = enrichAll();
            for (let i=0; i<5; i++) dynamicAlerts.push(generateAlert());

            document.getElementById('tabs-bar').addEventListener('click', e => {
                const btn = e.target.closest('[data-tab]');
                if (!btn) return;
                activeTab = btn.getAttribute('data-tab');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b===btn));
                renderCurrentTab();
            });

            renderCurrentTab();
            window.addEventListener('resize', () => {
                if (activeTab==='dashboard') renderDashboardCharts();
                else if (activeTab==='tradedesk') renderTradeDeskCharts();
                else if (activeTab==='predictiq') renderPredictIQCharts([2026,2027,2028,2029,2030,2031,2032].map((yr,i)=>{const b=currentPlants.reduce((s,p)=>s+p.total,0);return{year:yr,base:Math.round(b*(1-i*0.04)),optimistic:Math.round(b*(1-i*0.07)),pessimistic:Math.round(b*(1-i*0.01)),target:Math.round(b*(1-i*0.055))};}));
                else if (activeTab==='esgpulse') renderESGCharts();
                else if (activeTab==='scopelink') { let fs=[]; for(let cid in supplierMaster){let facDef=0,facPri=0,facResp=0,facTotal=0;for(let cat in supplierMaster[cid]){facTotal++;const s=supplierMaster[cid][cat];facDef+=s.defaultMT;if(s.primaryMT!=null){facResp++;facPri+=s.primaryMT;}}const co=currentPlants.find(p=>p.id===cid);fs.push({id:cid,name:co?co.name:cid,total:facTotal,responded:facResp,defaultMT:facDef,primaryMT:facPri,coverage:facDef>0?Math.round((facPri/facDef)*100):0});} renderScopeLinkCharts(fs); }
                else if (activeTab==='creditsim' && window.runSimFn) window.runSimFn();
            });

            // Background animation
            (function() {
                const canvas = document.getElementById('bg-canvas');
                const ctx = canvas.getContext('2d');
                let W,H,particles=[];
                function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
                resize(); window.addEventListener('resize', resize);
                class Particle {
                    constructor() { this.reset(); }
                    reset() { this.x=Math.random()*W; this.y=Math.random()*H; this.r=Math.random()*1.5+0.3; this.vx=(Math.random()-0.5)*0.3; this.vy=(Math.random()-0.5)*0.3; this.alpha=Math.random()*0.5+0.1; this.color=Math.random()>0.6?'rgba(74,222,128,':'rgba(34,211,238,'; }
                    update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset(); }
                    draw() { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=this.color+this.alpha+')'; ctx.fill(); }
                }
                for(let i=0;i<180;i++) particles.push(new Particle());
                const orbs = [
                    { x:W*0.15, y:H*0.2, r:150, vx:0.08, vy:0.04, color:'rgba(30,111,92,0.06)' },
                    { x:W*0.8, y:H*0.7, r:200, vx:-0.06, vy:0.05, color:'rgba(10,50,80,0.05)' },
                    { x:W*0.5, y:H*0.5, r:120, vx:0.04, vy:-0.06, color:'rgba(74,222,128,0.03)' }
                ];
                function drawConnections() {
                    for(let i=0;i<particles.length;i++) {
                        for(let j=i+1;j<particles.length;j++) {
                            const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
                            const dist=Math.sqrt(dx*dx+dy*dy);
                            if(dist<100) {
                                ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
                                ctx.strokeStyle=`rgba(30,111,92,${0.08*(1-dist/100)})`; ctx.lineWidth=0.5; ctx.stroke();
                            }
                        }
                    }
                }
                function animate() {
                    ctx.clearRect(0,0,W,H);
                    orbs.forEach(o => {
                        o.x+=o.vx; o.y+=o.vy;
                        if(o.x<-o.r||o.x>W+o.r) o.vx*=-1;
                        if(o.y<-o.r||o.y>H+o.r) o.vy*=-1;
                        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
                        g.addColorStop(0,o.color); g.addColorStop(1,'transparent');
                        ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
                    });
                    drawConnections();
                    particles.forEach(p=>{ p.update(); p.draw(); });
                    requestAnimationFrame(animate);
                }
                animate();
            })();
        })();
    </script>
